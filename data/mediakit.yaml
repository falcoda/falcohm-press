  geo:
    - { icon: pin,    title: "Brabant wallon",  text: "Notre base : Genappe, Nivelles, Louvain-la-Neuve." }
    - { icon: globe,  title: "Bruxelles",       text: "Une part importante du public vient de la capitale." }
    - { icon: social, title: "Flandre et France", text: "Les plateaux d'artistes attirent au-delà de la Wallonie." }
  band:
    title: "Une communauté, pas une audience."
    text: >-
      27 000 abonnés cumulés, un public qui revient d'une date à l'autre et relaie nos annonces.

