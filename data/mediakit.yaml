    - { tier: "Officiel", title: "Partenaire officiel",       text: "Naming d'une scène ou d'un projet, activation sur site, contenus dédiés." }
  band:
    title: "Ce media kit ne demande rien."
    text: >-
      Il vous montre ce que nous sommes. Si le projet vous parle, la conversation peut commencer :
