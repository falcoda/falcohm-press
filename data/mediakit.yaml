content:
  baseline: "Collectif belge, sound system, événements underground depuis 2020."
  manifesto:
    - "Le son d'abord."
    - "Le reste suit."
  manifesto_text: >-
    Gazmatek est né d'une conviction simple : une soirée se juge à ce qu'on entend, pas à ce qu'on
    dépense. Nous programmons des artistes, nous construisons nos propres systèmes audio et nous
    faisons vivre une scène indépendante en Belgique. Sans structure commerciale, sans actionnaire,
    avec plus de quarante bénévoles.
  events_intro: >-
    Depuis 2020, Gazmatek a construit une scène : des soirées en warehouse, des plateaux
    d'artistes internationaux, des festivals. Chaque date est sonorisée par notre propre matériel.
  events_band:
    title: "Une scène, pas une série de soirées."
    text: >-
      Le public revient : c'est ce qui fait la valeur d'une marque événementielle, et ce qui
      intéresse un partenaire.
  partners_intro: >-
    Nos partenaires ne se contentent pas d'un logo sur une affiche : ils équipent un projet réel,
    utilisé toute l'année, et leur nom circule avec lui.
  partners_band:
    title: "Il reste de la place."
    text: >-
      Nous construisons des relations longues, pas des échanges ponctuels. Si votre marque a du
      sens sur nos événements, parlons-en.

audience:
  intro: >-
    Notre public est jeune, urbain et très actif en ligne. Il vient pour la musique et il revient :
    c'est une communauté, pas une audience de passage.
