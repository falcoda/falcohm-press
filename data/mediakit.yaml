opportunities:
  intro: >-
    Nous ne vendons pas des emplacements publicitaires. Nous construisons des collaborations dans
    lesquelles votre marque a un rôle : équiper, soutenir, activer.
  families:
    - { icon: speaker,   title: "Partenariat technique",  text: "Vous fournissez du matériel ou des conditions ; il tourne toute l'année sur nos dates." }
    - { icon: megaphone, title: "Partenariat de marque",  text: "Visibilité, activation sur site, contenus dédiés." }
    - { icon: shield,    title: "Soutien institutionnel", text: "Subvention ou mise à disposition, valorisée sur tous nos supports." }
  levels:
