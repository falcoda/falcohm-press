why_us: 'B&C est la référence absolue du transducteur pour caisson à pavillon : le
  21DS115 et le 18SW115 sont littéralement les moteurs des sound systems horn-loaded
  européens. Falc''ohm construit des subs horn et des tops multi horn entry d''après
  des plans : le choix du transducteur est largement contraint par la conception acoustique,
  et B&C figure presque toujours dans la liste. Ils fournissent aussi les kits de
  reconing, ce qui couvre le besoin de maintenance sur 5-10 ans. Enfin, le groupe
  détient 18Sound et Ciare : un seul accord peut ouvrir trois catalogues.'
ask:
  type:
  - material
  - discount
  - consumables
  detail: Ouverture d'un compte à conditions professionnelles / OEM sur les séries
    DS et SW, fourniture ou prise en charge partielle des HP de grave des nouveaux
    caissons horn, et mise à disposition d'un stock de kits de reconing pour la maintenance
    du parc. À défaut d'un accord direct, orientation vers leur centre de distribution
    européen (Sound & Vision) avec conditions négociées.
