  rationale: 'Fit maximal : leurs HP sont exactement ce que le projet exige, et le
    besoin est récurrent (reconing). Mais B&C est une société cotée, structurée autour
    d''un réseau de distributeurs et de gros comptes OEM, sans aucun programme de
    mécénat identifié — une ASBL belge de 40 bénévoles n''est pas leur canal. Probabilité
    faible en direct : à jouer plutôt via un distributeur (TLHP, SoundImports) ou
    via 18Sound. Impact maximal si ça aboutit, car c''est le composant qui décide
    du son du système entier.'
