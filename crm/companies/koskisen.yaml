why_us: 'Contrairement aux autres fabricants nordiques, Koskisen publie nominativement
  ses commerciaux de zone AVEC leurs emails directs, et surtout une adresse dédiée
  aux demandes contreplaqué (Mirkka Aarrekorpi). On peut donc parler à un humain identifié,
  pas à un formulaire. André Wolff couvre le contreplaqué fin pour l''Allemagne/Autriche/Suisse/France
  et Maxime Pelikh la France : la Belgique est à la charnière de leurs zones, et un
  francophone (Maxime Pelikh) est joignable directement — ce qui lève la barrière
  de la langue et rend l''approche crédible.'
ask:
  type:
  - material
  - discount
  detail: 'Contacter Mirkka Aarrekorpi (demandes contreplaqué) et Maxime Pelikh (Area
    Manager francophone) pour : un tarif direct usine ou une dotation en contreplaqué
    bouleau pour la fabrication des enceintes, et/ou une orientation vers leur distributeur
    Benelux. Contrepartie : marque visible sur le sound system, contenu technique
    et images de fabrication.'
