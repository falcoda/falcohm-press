  rationale: 'Fit très élevé : fabricant intégré de contreplaqué bouleau, exactement
    l''amont du besoin. La probabilité reste faible — un industriel finlandais n''a
    aucune raison structurelle de sponsoriser une asbl belge et vend par volumes industriels
    — mais elle est supérieure à celle des autres fabricants (3 et non 2) parce qu''un
    Area Manager FRANCOPHONE (Maxime Pelikh) et un contact dédié contreplaqué sont
    joignables en direct par email : la barrière d''entrée est bien plus basse. Impact
    bon si ça aboutit, ne serait-ce qu''en tarif direct ou en orientation vers le
    bon distributeur Benelux.'
