  detail: 'Compte professionnel avec remise négociée sur le multiplex bouleau (15/18/21
    mm), accès prioritaire aux chutes et fins de série de panneaux, et fourniture
    de colles/produits de finition. Visite de l''atelier de Genappe proposée : ils
    sont à 20 minutes. Contrepartie : logo sur le sound system, mentions sur les 10-15
    événements Gazmatek/an et auprès des 27 000 abonnés.'
