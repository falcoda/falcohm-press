why_us: 'La cible la plus évidente de la catégorie : ~18 km de l''atelier de Genappe,
  même province (Brabant wallon). Entreprise familiale (75 ans) où la décision se
  prend en interne, sans comité de sponsoring. Surtout : ils sponsorisent DÉJÀ un
  club local (CTT Tourinnes) — la démarche ''soutenir une asbl du coin'' fait partie
  de leur culture. Ils vendent exactement notre matière première n°1 (multiplex) et
  sont sur un site de scierie : les chutes et fins de série existent physiquement
  chez eux.'
