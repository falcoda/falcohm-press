why_us: 'Oberton est le meilleur compromis euros/décibels de la liste : des transducteurs
  fabriqués dans l''UE, de qualité pro reconnue (tests audioXpress sur leurs moteurs
  1,4\"), à un prix qui permet d''équiper un parc entier plutôt qu''un seul caisson.
  Pour une ASBL qui doit équiper une série complète de subs horn et de tops avec un
  budget de bénévoles, c''est l''option qui rend le projet finançable. Fabricant de
  taille moyenne, en croissance et en recherche de notoriété en Europe de l''Ouest
  : un rig belge de référence a une vraie valeur marketing pour eux.'
ask:
  type:
  - material
  - discount
  - consumables
  detail: 'Tarif professionnel / prix quantité sur les woofers 18\"-21\" et les moteurs
    de compression pour équiper la série complète, ou dotation partielle en échange
    de visibilité. Passer si nécessaire par leur distributeur zone France/Benelux
    (TLHP). Contrepartie : marquage sur les façades, making-of du build et visibilité
    sur 10-15 événements/an.'
