why_us: '18Sound est le transducteur historique du sound system : rendement élevé,
  pavillonnable, et surtout une documentation technique (paramètres Thiele-Small,
  notes d''application, designs de pavillons) plus ouverte que la moyenne — exactement
  ce dont a besoin une équipe qui construit ses caissons d''après plans. Contrairement
  à sa maison mère B&C, 18Sound reste une structure de taille humaine à Reggio Emilia,
  avec une adresse e-mail directe publiée. C''est la meilleure porte d''entrée du
  groupe B&C.'
ask:
  type:
  - material
  - discount
  - consumables
  detail: 'Conditions professionnelles / prix quantité sur les 21NLW et 12ND pour
    équiper la nouvelle série de subs horn et de tops, fourniture ou co-financement
    d''un premier jeu de transducteurs, et accès aux kits de recone pour la maintenance.
    En échange : marquage "Powered by 18 Sound" sur les façades et les racks, et visibilité
    sur 10-15 événements/an.'
