  rationale: 'Fit modéré et honnête : c''est un importateur de bois massif (130 essences,
    bois durs/tendres, Accoya) et je n''ai PAS pu confirmer sur leur site qu''ils
    tiennent du contreplaqué bouleau — le coeur du besoin de Falc''ohm n''est donc
    pas garanti chez eux, d''où un 5. La probabilité reste moyenne malgré la taille,
    parce qu''on dispose d''un contact wallon nommé et d''un propriétaire joignable
    directement, ce qui compense la structure. Impact élevé si ça mord : leur volume
    rend une dotation en nature quasi indolore, et l''entreprise a le poids pour un
    engagement pluriannuel.'
