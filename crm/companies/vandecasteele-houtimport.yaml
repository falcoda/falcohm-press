  detail: 'Approche par David Pierre (Sales Manager Wallonië) : tarif partenaire ou
    dotation en nature sur les panneaux et le bois nécessaires aux enceintes, plus
    accès aux chutes et fins de série. Angle durabilité : des enceintes fabriquées
    à la main, réparables et conservées 10 ans, illustrent concrètement leur discours
    sur le bois responsable.'
