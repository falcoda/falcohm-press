  activity: Entreprise familiale d'importation de bois fondée en 1883 à Aalbeke (Courtrai),
    l'une des plus grandes d'Europe. 4e génération, dirigée par Stefaan Vandecasteele.
    Capacité de stockage annoncée de 140 000 m³ sur 20 hectares (dont 16 couverts)
    et plus de 130 essences. Très engagée sur la traçabilité et la gestion forestière
    durable (FSC, ATIBT, Fair&Precious, UN Global Compact).
