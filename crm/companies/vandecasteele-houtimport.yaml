why_us: 'Ils publient un ''Sales Manager Wallonië'' nommé, David Pierre, avec son
  email direct : on entre par la porte wallonne d''un géant, sans passer par un standard.
  C''est le seul acteur du panel doté d''un stock de cette taille (140 000 m³) — une
  palette de panneaux ne représente rien pour eux, ce qui rend un don en nature indolore.
  Leur discours public est massivement axé durabilité et responsabilité (UN Global
  Compact, Fair&Precious) : une asbl non lucrative qui construit du matériel durable
  et réparable s''inscrit dans ce récit.'
