why_us: 'Würth couvre trois postes récurrents et à faible coût unitaire de la fabrication
  d''enceintes : la visserie/fixation, les colles et consommables, et l''outillage
  d''atelier. Le siège Belux et un shop sont à Turnhout, une décision de compte pro
  se prend localement. L''angle réaliste n''est pas un sponsoring (leur sponsoring
  groupe est verrouillé sur le sport auto et le foot) mais un COMPTE PARTENAIRE avec
  conditions ASBL et dotation de consommables, plus atteignable via le réseau de shops
  belge.'
