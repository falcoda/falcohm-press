why_us: 'Ils annoncent explicitement une gamme de multiplex ''en base peuplier ou
  bouleau'', y compris prépeints et vernis — donc l''essence exacte du besoin, avec
  des finitions qui pourraient éviter à Falc''ohm une étape de vernissage. Petite
  structure de 5 à 9 personnes : le décideur est joignable en un appel. Bruxelles
  (Forest) est à ~25 km de Genappe, donc l''enlèvement reste réaliste. Leur discours
  sur l''approvisionnement responsable et le recyclage colle aux valeurs d''une asbl
  non lucrative.'
