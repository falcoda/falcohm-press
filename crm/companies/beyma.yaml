  detail: 'Tarif professionnel / prix quantité sur la série 21SW et les moteurs CP,
    dotation ou co-financement d''un jeu de transducteurs pour la nouvelle série de
    subs horn et de tops, et accès aux kits de reconing. Contrepartie : marquage "Powered
    by Beyma" sur les façades, visibilité sur 10-15 événements et sur le making-of
    de la construction des caissons.'
