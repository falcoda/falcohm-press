why_us: 'Beyma est un des rares fabricants de transducteurs pro qui publie une adresse
  e-mail directe et qui a gardé une taille humaine (entreprise familiale, une seule
  usine). Sa gamme 21SW/18LEX est taillée pour le grave à fort niveau, et les moteurs
  CP38x sont des classiques des tops à pavillon. Pour une ASBL belge, c''est le fabricant
  "premier rang" le plus atteignable : pas de holding cotée, pas de comité de sponsoring,
  un service technique centralisé à Valence qui répond aux constructeurs.'
