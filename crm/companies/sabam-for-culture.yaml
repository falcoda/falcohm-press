  rationale: 'Le fit est moyen et il faut être lucide sur pourquoi : la majorité des
    bourses Sabam s''adressent à des AUTEURS MEMBRES (compositeurs, éditeurs), pas
    à un organisateur de festival — Falc''ohm n''est pas dans la cible naturelle.
    Deux bourses seulement (budget artistique d''un concert live ; organisation d''un
    concert live par une structure) ouvrent une porte réelle, et l''appel à partenariats
    2027 est explicitement tourné vers l''export international, ce qui exclut de fait
    un festival local. La probabilité est donc moyenne et l''impact limité à quelques
    milliers d''euros, mais le fonds distribue plus de 100.000 € par session musique
    : le budget est là, il faut juste frapper à la bonne porte, et une seule.

    '
