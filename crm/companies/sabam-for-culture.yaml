why_us: 'La Sabam finance déjà des projets musicaux à hauteur de plus de 100.000 €
  par session de commission (28 projets musicaux soutenus pour 115.000 € lors d''une
  session récente) : le budget existe et sa raison d''être est d''être distribué au
  secteur musical. Gazmatek diffuse des auteurs dont la Sabam perçoit les droits —
  l''ASBL est donc du bon côté de l''écosystème. L''angle le plus solide n''est cependant
  pas le festival en tant que tel : ce sont les bourses liées à l''organisation de
  concerts live et au budget artistique, qui financent les cachets d''un organisateur
  plutôt que la carrière d''un artiste.

  '
ask:
  type:
  - financial
  detail: 'Deux portes distinctes, à ne pas confondre. (1) BOURSES (grants@sabam.be)
    — le catalogue « musique » comprend des bourses accessibles à un ORGANISATEUR
    et non seulement à un auteur, notamment une bourse liée au budget artistique d''un
    concert live / livestream, et une bourse destinée aux établissements et maisons
    de jeunes qui organisent un concert live. C''est la voie la plus réaliste : elle
    finance des cachets. (2) PARTENARIATS (sabamforculture@sabam.be / justine.cornet@sabam.be)
    — mais l''appel 2027 est orienté INTERNATIONAL (vitrines à l''export, résidences
    croisées, professionnalisation à l''export), ce qui ne correspond pas à un festival
    local : n''y aller que si Gazmatek développe un volet international réel.

    '
  realistic_value_eur: 2500
