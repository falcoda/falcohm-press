next_action:
  what: Écrire à grants@sabam.be pour demander le règlement exact et le montant de
    la bourse « budget artistique concert live » et de la bourse « organisation d'un
    concert live » — et vérifier si une ASBL organisatrice non-membre y est éligible
  due: '2026-09-30'
notes: 'POINT DE VIGILANCE N°1 — la plupart des dispositifs Sabam For Culture supposent
  d''être MEMBRE de la Sabam (auteur, compositeur, éditeur). Falc''ohm System est
  un organisateur, pas un ayant droit. AVANT de monter un dossier, poser la question
  frontalement à grants@sabam.be : « une ASBL organisatrice, non membre, est-elle
  éligible à la bourse budget artistique concert live ? ». La réponse conditionne
  tout le reste.

  POINT DE VIGILANCE N°2 — l''appel à PARTENARIATS 2027 porte exclusivement sur des
  dispositifs à portée INTERNATIONALE : vitrines de créateurs à l''étranger, sessions
  de pitching, résidences croisées Belgique ↔ International, professionnalisation
  à l''export. Un festival local n''y entre pas. Ne pas y perdre de temps sauf si
  Gazmatek monte un volet international (échange avec un sound system étranger, par
  exemple) — auquel cas l''angle devient soudain excellent.

  BOURSES REPÉRÉES dans l''annuaire sectoriel de Court-Circuit et pertinentes pour
  un organisateur : « Bourse pour les établissements horeca et les maisons de jeunes
  qui organisent un concert live » et « Budget artistique concert live / livestream
  ». Les montants exacts ne sont pas publiés sur les pages publiques : la liste des
  bourses est chargée dynamiquement en JavaScript et n''a pas pu être extraite. →
  NON VÉRIFIÉ : montants, conditions détaillées et dates limites de ces deux bourses.

  Le catalogue complet des bourses se filtre par discipline sur https://www.sabam.be/fr/sabamforculture/grants
  (sélectionner « Musique »).

  '
