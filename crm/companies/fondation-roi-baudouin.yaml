why_us: 'La FRB ne finance jamais « en général » : elle ne finance QUE via un appel
  à projets précis auquel on répond. C''est ce qui la rend à la fois difficile et
  intéressante — il n''y a pas de porte à pousser, il y a une liste à surveiller.
  Deux piliers sur six peuvent accueillir Gazmatek : « Éducation et développement
  des talents » (transmission d''un savoir-faire technique de fabrication à des dizaines
  de jeunes bénévoles) et « Climat, environnement et biodiversité » (fabriquer et
  réparer son propre matériel plutôt qu''acheter et jeter). Le pilier « Patrimoine
  et culture » est en revanche très orienté patrimoine bâti et musées : ce n''est
  pas notre porte. Levier secondaire non négligeable : le « compte de projet » FRB
  permet à une ASBL de collecter des dons défiscalisés sans disposer elle-même de
  l''agrément fiscal.

  '
ask:
  type:
  - financial
  detail: 'Il n''existe AUCUN guichet permanent : il faut répondre à un appel à projets
    ouvert. Deux actions concrètes : (1) surveiller mensuellement la liste des appels
    ouverts sur kbs-frb.be et candidater dès qu''un appel touche la jeunesse, la transmission
    de savoir-faire technique, l''économie circulaire ou la cohésion locale — les
    montants observés sur ce type d''appels vont de 15.000 € à 20.000 € par projet
    ; (2) ouvrir un « compte de projet » FRB pour permettre aux donateurs de Falc''ohm
    de bénéficier de l''attestation fiscale, ce qui ne coûte rien et augmente mécaniquement
    la collecte privée.

    '
