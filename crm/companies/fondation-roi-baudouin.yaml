notes: "RÈGLE D'OR DE LA FRB : « Pour bénéficier du soutien de la Fondation, les organisations\
  \ doivent répondre à l'un des appels à projets. » Il n'y a PAS de demande spontanée.\
  \ Envoyer un dossier hors appel est une perte de temps.\nCONTACTS : la FRB ne publie\
  \ AUCUN email générique de type info@. Les seuls canaux sont le formulaire de contact\
  \ et le centre de contact au +32 2 500 4 555 (jours ouvrables, 9h-17h). Le seul\
  \ email nominatif public utile pour la Wallonie est celui du Hub Liège (Hélène De\
  \ Coninck, hubliege@kbs-frb.be), qui est l'ancrage local FRB côté wallon — mais\
  \ il ne couvre pas spécifiquement le Brabant wallon. Ne pas inventer d'adresse.\n\
  OÙ CHERCHER LES BONS APPELS — deux piliers réalistes sur six : • « Éducation et\
  \ développement des talents » → angle : transmission d'un savoir-faire technique\
  \ (fabrication\n  d'enceintes) à 40+ jeunes bénévoles. C'est le meilleur angle FRB,\
  \ et de loin.\n• « Climat, environnement et biodiversité » → angle : économie circulaire,\
  \ fabriquer et réparer plutôt\n  qu'acheter et jeter.\nLe pilier « Patrimoine et\
  \ culture » est à ignorer : il finance des musées, des monuments et des collections.\n\
  GAIN SANS RISQUE : le « compte de projet » de la FRB permet à une ASBL sans agrément\
  \ fiscal propre de recevoir des dons ouvrant droit à l'attestation fiscale, le montant\
  \ étant fixé par le bénéficiaire selon son projet. C'est un outil de collecte, pas\
  \ un subside — mais il ne coûte rien et augmente le rendement de tout appel aux\
  \ dons. À instruire indépendamment des appels à projets.\nNON VÉRIFIÉ : le montant\
  \ et les conditions exactes du compte de projet n'ont pas été confirmés sur une\
  \ page officielle (le site bloque l'accès automatisé sur plusieurs pages — code\
  \ 403).\n"
