  rationale: 'Le fit est faible et il faut le dire : la FRB ne finance pas les festivals
    de musique, et son pilier « Patrimoine et culture » vise essentiellement le patrimoine
    bâti et les musées. Aucun appel à projets correspondant à Gazmatek n''était ouvert
    au 14/07/2026. La probabilité est donc basse : il n''y a pas de porte à pousser,
    seulement une liste à surveiller, et la concurrence nationale sur chaque appel
    est féroce. L''impact reste élevé si un appel s''aligne (15.000-20.000 € par projet,
    plus la caution morale de la première fondation du pays), et le « compte de projet
    » constitue à lui seul un gain sans risque. À traiter en veille, pas en priorité.

    '
