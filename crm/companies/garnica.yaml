  detail: 'Prise de contact via leurs implantations françaises (Samazan / Troyes)
    : tarif direct ou dotation en contreplaqué à parement bouleau, et évaluation technique
    de leurs panneaux légers pour des caissons d''enceintes plus faciles à transporter.
    Contrepartie : marque visible sur le sound system, retour d''expérience technique
    et images de fabrication.'
