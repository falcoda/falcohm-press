notes: 'ÉLIGIBILITÉ : « Toute organisation qui n''est pas une société » peut demander
  du soutien — les sociétés coopératives agréées sont limitées à certains projets
  spécifiques. Une ASBL est donc pleinement éligible.

  MONTANT : jusqu''à 3.000 € auprès du Conseil Consultatif Régional. Ne pas surestimer
  : c''est un coup de pouce, pas un financement structurant.

  MÉCANIQUE À COMPRENDRE — c''est là que se joue le dossier : les projets à impact
  LOCAL sont orientés vers les Conseils Consultatifs Régionaux (CCR), composés chacun
  d''une vingtaine de représentants des sociétaires, qui évaluent et décident eux-mêmes
  de l''octroi et du montant. Ce ne sont donc pas des fonctionnaires ni des experts
  culturels : ce sont des coopérateurs de la région. Le dossier doit être écrit pour
  EUX — lisible, concret, ancré localement, sans jargon du secteur musical. Les projets
  dont l''impact dépasse le territoire d''un seul CCR sont orientés vers la Réunion
  des Bureaux (RDB), composée des présidents et vice-présidents de tous les CCR de
  Wallonie.

  CALENDRIER : il est possible d''introduire une demande toute l''année, en respectant
  les délais d''introduction propres à chaque CCR. Il faut donc IMPÉRATIVEMENT connaître
  la date de la séance visée avant de déposer — sans quoi le dossier attend plusieurs
  mois. C''est l''unique information manquante, et elle s''obtient par téléphone.

  ANGLE À PRIVILÉGIER devant un conseil de coopérateurs : la participation (40+ bénévoles),
  la transmission d''un savoir-faire technique à des jeunes, et l''économie circulaire
  (fabriquer et réparer plutôt qu''acheter et jeter). Ne PAS mettre la musique électronique
  au centre du récit.

  '
