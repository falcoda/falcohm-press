why_us: 'Cera est l''un des rares financeurs privés belges dont la porte est réellement
  ouverte à une petite ASBL : le soutien est explicitement accessible à « toute organisation
  qui n''est pas une société », les dossiers sont instruits par des sociétaires bénévoles
  de la région concernée — donc par des gens du Brabant wallon, sensibles à un projet
  du Brabant wallon — et la coopérative soutient déjà des festivals (Festival de l''Été
  Mosan, Festival de Stoumont) dans son domaine « art et culture ». Le montant est
  modeste (3.000 € maximum), mais le coût d''entrée l''est aussi : un formulaire en
  ligne, pas de dossier de trente pages. C''est un des « oui » les plus faciles du
  portefeuille, et un premier financeur privé qui crédibilise le tour de table.

  '
ask:
  type:
  - financial
  detail: 'Soutien sociétal Cera au niveau régional, via le Conseil Consultatif Régional
    (CCR) compétent pour le Brabant wallon : jusqu''à 3.000 €. Introduction via le
    formulaire de demande en ligne, en respectant les délais d''introduction propres
    au CCR (les demandes peuvent être introduites tout au long de l''année, mais chaque
    CCR a ses dates de réunion — il faut donc caler le dépôt sur la séance visée).
    Domaine à cocher : « art et culture dans une société en évolution ». Angle : un
    festival non lucratif porté par 40+ bénévoles qui fabriquent eux-mêmes leur matériel
    — participation, transmission, économie circulaire.

    '
