  rationale: 'Le règlement vise nommément les festivals et concerts organisés par
    des ASBL sur le territoire du Brabant wallon : l''ASBL y est domiciliée et Gazmatek
    s''y déroule, donc le fit est quasi parfait, et la volumétrie (+10.000 festivaliers)
    place le dossier en Catégorie 1, plafond 10.000 €. La probabilité est la plus
    élevée du portefeuille : les critères d''exclusion sont formels et franchissables,
    et l''instruction est faite sur dossier par un collège d''agents administratifs,
    pas par un jury politique. Le seul vrai risque est budgétaire : les demandes sont
    examinées PAR ORDRE D''ARRIVÉE selon le crédit disponible, donc un dépôt tardif
    peut échouer sur un budget épuisé, quelle que soit la qualité du projet.

    '
