notes: 'MONTANTS (Aide événements culturels) — Cat. 1 : public > 1.000 pers. ET budget
  > 50.000 € ET caractère supra local → subvention > 1.500 €, plafond 10.000 €. Cat.
  2 : public > 500 ET budget > 30.000 € → plafond 5.000 €. Cat. 3 : public ≥ 100 ET
  budget < 30.000 € → maximum 1.500 €. En cas de conflit entre catégories, c''est
  le critère BUDGET qui tranche.

  CRITÈRES D''EXCLUSION (éliminatoires) : ne pas être une asbl ou une association
  de fait ; bénéficier déjà d''une subvention récurrente ≥ 2.000 € au budget provincial
  ; avoir un contrat de gestion avec la Province ; activité déjà subventionnée par
  un autre service provincial ; activité à but philanthropique. → VÉRIFIER le premier
  point avant toute chose : s''il tombe, le dossier est mort d''office.

  PIÈGE MAJEUR : « Les demandes seront examinées par ordre d''arrivée en fonction
  du crédit budgétaire disponible » et « les demandes de subvention sont analysées
  l''année budgétaire durant laquelle l''événement a lieu ». Traduction : déposer
  le plus tôt possible dans l''année civile de l''événement. Un dossier parfait déposé
  en septembre peut être refusé faute de crédit restant.

  LIMITE : une seule demande par an sur ce règlement.

  CRITÈRES D''ANALYSE NOTÉS : visée supracommunale ; importance et diversité du public
  (les jeunes sont explicitement cités, ainsi que la tarification solidaire et la
  gratuité ciblée) ; émergence et promotion de NOUVEAUX ARTISTES DU BRABANT WALLON
  ; identité culturelle du BW et dimension provinciale (visibilité, LOGO, rayonnement
  média) ; budget réaliste et recherche d''autres soutiens ; partenariats et mutualisation
  ; BONUS développement durable. → Trois leviers gratuits à activer dans le dossier
  : programmer des artistes électro du Brabant wallon, afficher le logo de la Province,
  documenter la démarche éco-responsable.

  PLACE AUX JEUNES : le porteur formel est la COMMUNE — impossible de déposer seul.
  Le dossier se construit avec Michaël Rouffiange (échevin des Festivités et de la
  Jeunesse à Genappe). Le doublement provincial ne porte QUE sur les cachets artistiques
  et leurs besoins logistiques et techniques — ce qui peut inclure le déploiement
  du sound system. Le projet doit faire appel à au moins un artiste et cibler les
  10-20 ans.

  '
