profile:
  activity: Pouvoir provincial du Brabant wallon. Sa Direction d'administration de
    la culture, du sport et du tourisme subventionne les opérateurs culturels et les
    événements se déroulant sur le territoire provincial. Bâtiment Archimède, Place
    du Brabant wallon 1, 1300 Wavre.
  products:
  - Aide à l'organisation d'événements culturels — 3 catégories selon l'ampleur, jusqu'à
    10.000 €
  - Place aux jeunes — contrepartie communale (1 € commune = 1 € Province) pour événements
    10-20 ans, 1.000 à 5.000 €
  - Appel à projets pour les associations actives en éducation permanente
