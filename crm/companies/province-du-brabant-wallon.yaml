why_us: 'L''ASBL est domiciliée à Genappe et Gazmatek se déroule sur le territoire
  provincial : la condition territoriale — celle qui élimine le plus de candidats
  — est acquise d''office. Le règlement cite nommément les « festivals » et les «
  concerts » parmi les activités à réelle dimension culturelle, et réserve l''aide
  aux ASBL et associations de fait, à l''exclusion des sociétés commerciales : Falc''ohm
  System est exactement le profil ciblé. Avec plus de 10.000 festivaliers, Gazmatek
  relève de la Catégorie 1 (grande ampleur), le plafond le plus élevé. Les critères
  d''analyse récompensent précisément nos points forts : diversité et jeunesse des
  publics, promotion d''artistes du Brabant wallon, tarification accessible, liens
  avec le tissu associatif local, et développement durable en critère bonus.

  '
ask:
  type:
  - financial
  detail: 'DEUX dispositifs à jouer en parallèle. (1) « Aide à l''organisation d''événements
    culturels », Catégorie 1 (public > 1.000 ET budget > 50.000 € ET caractère supracommunal)
    : subvention supérieure à 1.500 € avec un plafond de 10.000 €. Une seule demande
    par an, au minimum 2 mois avant le début de l''événement, par courriel à culture.loisirs.citoyennete@brabantwallon.be
    avec le formulaire PDF et ses annexes. (2) « Place aux jeunes » : chaque euro
    investi par la COMMUNE est doublé par le Brabant wallon, uniquement pour des cachets
    artistiques et leurs besoins en logistique et technique — minimum 1.000 €, plafond
    5.000 €. Le projet est porté par la commune mais « il peut être porté par une
    association locale » et doit viser les 10-20 ans : à monter avec Genappe.

    '
  realistic_value_eur: 8000
