  rationale: 'Fit maximal : ils FABRIQUENT le contreplaqué bouleau, c''est littéralement
    la matière première n°1 de Falc''ohm, et la gamme Riga Ply vise les applications
    mécaniquement exigeantes. Mais la probabilité est faible et il faut l''assumer
    : multinationale lettone qui vend par conteneurs à des distributeurs, sans lien
    avec la Belgique associative, sans historique de mécénat repéré, et sans commercial
    Benelux nommé publiquement. Impact élevé si par extraordinaire ça passe — tarif
    usine sur 5-10 ans, ou au minimum une introduction appuyée chez leur distributeur
    local, ce qui est le résultat réaliste à viser.'
