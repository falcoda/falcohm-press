why_us: 'C''est la source amont : le fabricant du matériau exact (contreplaqué bouleau
  intégral) que Falc''ohm consomme depuis le début. La gamme Riga Ply — bouleau tout
  épaisseur, poncé deux faces, conçue pour les applications exigeant les meilleures
  propriétés mécaniques — correspond au cahier des charges d''un caisson d''enceinte.
  Un partenariat direct (ou même une simple mise en relation avec leur distributeur
  Benelux) court-circuiterait la marge du négoce sur 5-10 ans. Marque forte et reconnue
  : leur nom sur un sound system a une vraie valeur de caution technique.'
ask:
  type:
  - material
  - discount
  detail: 'Deux demandes distinctes : (1) une dotation ou un tarif direct usine sur
    du contreplaqué bouleau Riga Ply pour les enceintes ; (2) à défaut, la mise en
    relation avec leur importateur/distributeur Benelux avec appui de leur part (le
    ''mot du fabricant'' vaut souvent la remise). Contrepartie : marque Riga Wood
    visible sur le sound system, contenu technique et photo/vidéo de fabrication réutilisable
    dans leur communication.'
