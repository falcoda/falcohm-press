why_us: 'Jupiler investit DÉJÀ dans la musique électronique belge : la scène Mirror
  House et le programme Talent TakeOff tournent à Dour, Les Ardentes, Voodoo Village
  et WECANDANCE. C''est exactement l''univers de Gazmatek. La bière est aussi un besoin/recette
  direct pour un festival. Limite : AB InBev est un géant au sponsoring très sélectif
  et centralisé ; un festival associatif de 10 000 personnes est petit pour eux.'
