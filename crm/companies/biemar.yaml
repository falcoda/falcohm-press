notes: 'Sites : Rue de la Clé 57, 4630 Soumagne (siège, +32 (0)4 377 94 94) et Route de Waimes 90, 4960
  Malmedy (+32 (0)80 79 97 97). Email général : info@biemar.be. Email marketing@biemar.be également publié
  — utile pour l''angle visibilité/sponsoring. STRATÉGIE : attaquer Serge Tilkin (panneaux) en premier
  ; Grégory Hochstenbach en second car il gère l''ACHAT bois, c''est lui qui sait où sont les fins de
  série. Pierre Thissen (dir. commercial) et Yvan Biemar (admin. délégué) sont nommés sur la page mais
  SANS email direct : ne pas deviner leur adresse. Aucun sponsoring sportif/culturel identifié : ce serait
  une première pour eux, donc argumenter par le produit (visibilité technique, vitrine de leur multiplex)
  plutôt que par le mécénat.'
