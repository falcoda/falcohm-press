profile:
  activity: 'Négociant wallon en bois et matériaux depuis 1925 (famille Biemar), implanté à Soumagne et
    Malmedy. Distribue tous types de bois, panneaux et dérivés, quincaillerie et outillage, avec plus
    de 35 000 références en stock et 55 000 m² de stockage. Dispose d''un atelier de transformation :
    découpe de panneaux, commande numérique, rabotage, collage de stratifié, placage de chants.'
  products:
  - Panneaux et dérivés du bois
  - Multiplex / contreplaqué
  - Bois de construction et ossature bois
  - Quincaillerie et outillage (Festool)
  - Découpe CNC et travail à façon sur panneaux
  size:
