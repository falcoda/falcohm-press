why_us: 'C''est le dossier le mieux armé de la catégorie côté contacts : Biemar publie nominativement
  son Responsable panneaux (Serge Tilkin) ET son Responsable bois / acheteur bois (Grégory Hochstenbach),
  avec emails directs. On attaque donc le décideur produit, pas un info@. Ils ont un atelier de découpe
  numérique : ils peuvent fournir les panneaux ET débiter les flancs d''enceintes. Négociant familial
  wallon (100 ans en 2025), sensible à l''ancrage régional.'
ask:
  type:
  - material
  - discount
  - services
  detail: 'Compte pro avec remise sur le multiplex bouleau (15/18/21 mm) récurrent, mise à disposition
    des chutes et fins de série de panneaux, et prestation de découpe CNC des flancs d''enceintes à tarif
    partenaire ou offerte. Contrepartie : visibilité sur le sound system et sur les 10-15 événements Gazmatek/an
    (+10 000 festivaliers, 27 000 abonnés).'
  realistic_value_eur: 5000
