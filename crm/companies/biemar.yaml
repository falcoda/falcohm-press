  rationale: 'Business fit très élevé : ils vendent les panneaux ET les débitent en CNC, ce qui couvre
    deux besoins d''un coup, avec 35 000 références et un vrai stock. La probabilité est bonne sans être
    maximale : entreprise familiale accessible et contacts nominatifs directs (rare dans ce panel), mais
    aucun antécédent de sponsoring trouvé et Soumagne est en province de Liège (~110 km de Genappe), donc
    l''argument de proximité ne joue pas. Impact élevé si ça passe : gros volumes possibles et découpe
    incluse.'
