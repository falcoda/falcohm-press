why_us: 'Precision Devices est LE spécialiste du très grand diamètre : leurs 18\",
  21\" et surtout le 24\" sont conçus pour le grave à fort niveau et sont un choix
  classique des caissons à pavillon. C''est exactement la partie du système Falc''ohm
  que les fabricants « généralistes » couvrent le moins bien. Structure britannique
  de taille moyenne, joignable par téléphone en direct, et un catalogue qui vit aussi
  de commandes spéciales / OEM — donc habituée aux petites séries et aux constructeurs.'
