why_us: 'L''amplification est la moitié du besoin que Falc''ohm ne peut pas fabriquer lui-même : on construit
  un caisson, on ne construit pas un ampli. Powersoft est la référence du rack de puissance de sound system
  (rendement, DSP embarqué, calage réseau) et c''est la seule société de la catégorie qui affiche un vrai
  programme de mécénat public — "Advocacy" — sponsorisant des écoles de musique, des installations artistiques,
  des associations caritatives et le fonds Crew Nation pour les techniciens du live. Le vocabulaire de
  Falc''ohm (non lucratif, jeunesse, technique, bénévoles) est exactement celui de leur page Advocacy
  : c''est la porte d''entrée, pas le service commercial.'
