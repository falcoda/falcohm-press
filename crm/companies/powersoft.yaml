  detail: 'Candidature au programme Advocacy : dotation ou prêt longue durée d''un rack d''amplification
    (2 à 4 amplis de la série Quattrocanali/X) pour les nouveaux subs horn et les tops, plus licences/formation
    ArmoníaPlus pour le calage système. À défaut : conditions professionnelles via leur distributeur autorisé
    Benelux. Contrepartie : marquage "Powered by Powersoft" sur les racks, visibilité sur 10-15 événements
    et +10 000 festivaliers/an.'
