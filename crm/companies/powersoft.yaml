notes: 'powersoft@pec.it est une adresse PEC (posta elettronica certificata) : c''est une boîte légale/administrative
  italienne, à ne PAS utiliser pour de la prospection. Aucun e-mail commercial nominatif n''est publié.
  La bonne voie est la page Advocacy + le formulaire "Commercial Enquiries". La page contacts précise
  explicitement de passer par les distributeurs autorisés pour toute demande de prix/disponibilité. Ce
  fichier remplace le stub legacy généré par l''ancien script.'
