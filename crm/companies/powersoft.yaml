  rationale: 'Besoin réel et non substituable : sans amplification, les caissons ne sonnent pas. Mais
    Powersoft est coté, applique une politique explicite de vente exclusivement via distributeurs autorisés,
    et son programme Advocacy est un canal de mécénat visible donc probablement sollicité en permanence
    — une petite ASBL belge y est un dossier parmi des centaines. Probabilité basse mais pas nulle : c''est
    la seule cible de la catégorie avec un antécédent de sponsoring documenté et un discours "give back
    to the community".'
