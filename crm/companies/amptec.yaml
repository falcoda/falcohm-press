why_us: 'Amptec est belge, à environ 1h30 de Genappe, et surtout : c''est la seule
  cible du module dont les DEUX dirigeants publient leur e-mail nominatif direct sur
  le site. Bart Willems (CEO) et Charlotte Willems (co-CEO) — entreprise familiale,
  décision prise par le patron, aucun comité de sponsoring à franchir. C''est structurellement
  la cible la plus « adressable » de toute la liste. Au-delà du sponsoring, ils couvrent
  trois besoins concrets et récurrents de Falc''ohm : l''amplification (via les marques
  distribuées), la confection de câblage sur mesure pour les racks et les façades,
  et un centre de réparation/pièces détachées pour l''entretien du parc.'
