profile:
  activity: Fabricant français de haut-parleurs professionnels depuis 1990, installé
    à Vaux-le-Pénil (Seine-et-Marne). Très petite structure (une poignée de salariés)
    mais fournisseur historique de transducteurs haut de gamme pour la sonorisation,
    le monitoring studio et la Hi-Fi.
  products:
  - Haut-parleurs de grave et grave/médium 8" à 15"
  - Médiums et médiums à haut rendement
  - Transducteurs pour sonorisation, monitoring et Hi-Fi (100+ références)
  - Reconing et réparation de ses propres HP
