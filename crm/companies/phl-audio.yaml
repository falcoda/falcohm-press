why_us: 'PHL est le seul fabricant de transducteurs francophone et de taille vraiment
  humaine de la liste : le dossier arrive en français, sur le bureau de quelqu''un
  qui décide. Leur positionnement — haut rendement, excursion contrôlée, fabrication
  en France — correspond mot pour mot au cahier des charges de la page « matériel
  » du dossier Falc''ohm. Et surtout : PHL a besoin de visibilité face aux marques
  italiennes. Un sound system belge visible sur 10-15 événements et +10 000 festivaliers/an,
  monté en PHL, est une vitrine qu''ils n''ont pas aujourd''hui. Le rapport de force
  est ici le plus favorable de tout le module.'
ask:
  type:
  - material
  - discount
  - visibility
  detail: 'Partenariat de visibilité croisée : conditions préférentielles ou dotation
    partielle sur les médiums et grave/médium des tops multi horn entry, en échange
    d''un marquage « Powered by PHL Audio » sur les façades, d''un making-of documenté
    de la construction et de mentions sur les réseaux (27 000 abonnés). Le grave des
    subs horn (21\") restera à sourcer ailleurs : proposer PHL sur la partie médium/haut
    du système.'
