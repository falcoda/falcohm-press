  rationale: 'Le catalogue PHL ne descend pas aussi bas que les 21\" des subs horn
    : le fit est donc excellent sur le médium/aigu des tops mais partiel sur le système
    complet, d''où 8 et non 9. En revanche c''est la meilleure probabilité parmi les
    fabricants : 6 à 9 salariés, francophone, e-mail direct, et un intérêt marketing
    évident à voir son nom sur un rig visible en Belgique. Impact modéré en euros
    mais fort en crédibilité technique (« nos médiums sont français »).'
