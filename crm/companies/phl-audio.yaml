notes: 'PHL ne distribue pas en direct partout : sa page « distribution » ne liste
  que deux distributeurs mondiaux, Audio Solvation (NL, Sittard — 1h de Genappe) et
  TLHP (FR). Les deux sont fichés séparément dans ce CRM et constituent une voie d''accès
  parallèle (et un levier : un accord PHL peut se négocier via Audio Solvation). PHL
  revendique des clients OEM de premier plan dans la sono (L-Acoustics, Nexo, Martin
  Audio, APG) — argument de crédibilité, mais non vérifié sur le site du fabricant
  lui-même.'
