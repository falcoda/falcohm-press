why_us: 'RAM Audio est l''ampli historique du sound system européen : robuste, puissant,
  réputé pour son rapport watts/euro, et conçu pour tourner des nuits entières à fort
  niveau — exactement le régime d''usage décrit dans le dossier Falc''ohm. C''est
  une PME familiale espagnole indépendante (pas un groupe coté), donc un interlocuteur
  où la décision se prend vite. Pour équiper un parc de subs horn et de tops sans
  exploser le budget, c''est l''alternative crédible à Powersoft.'
ask:
  type:
  - material
  - discount
  - loan
  detail: 'Conditions constructeur / prix quantité sur 2 à 4 amplis de puissance pour
    les nouveaux caissons, ou dotation/prêt longue durée d''un rack en échange de
    visibilité. Contrepartie : marquage « Powered by RAM Audio » sur les racks, visibilité
    sur 10-15 événements/an et sur les prestations techniques de Falc''ohm partout
    en Belgique.'
