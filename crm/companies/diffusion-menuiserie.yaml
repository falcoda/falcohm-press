why_us: 'Leur dépôt de Court-Saint-Étienne (1490) est le point de vente professionnel
  le plus proche de l''atelier de Genappe de tout le panel — une dizaine de kilomètres,
  même province. Ils proposent explicitement la découpe de multiplex, donc Falc''ohm
  peut sortir des panneaux déjà débités aux cotes des enceintes. Négoce wallon 100
  % régional (5 sites, tous en Wallonie) : l''argument ''nous sommes une asbl wallonne,
  vos clients sont nos festivaliers'' porte directement.'
