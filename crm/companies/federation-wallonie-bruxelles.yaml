notes: 'ÉLIGIBILITÉ — conditions cumulatives (fiche officielle mise à jour le 27 avril
  2026) : (1) personne morale établie en FWB [OK, Genappe] ; (2) AUCUN contrat-programme
  ni contrat de création/service/diffusion en cours [OK] ; (3) développer des activités
  artistiques PROFESSIONNELLES s''adressant significativement aux publics FWB [POINT
  FAIBLE — à argumenter : cachets réellement versés, billetterie, encadrement technique
  rémunéré] ; (4) promouvoir des artistes FWB visant une carrière professionnelle
  ; (5) pas de majorité de covers/tributes.

  SEUILS FESTIVAL MUSIQUES ACTUELLES (ÉLIMINATOIRES) : ≥ 7 concerts, ≥ 1/3 d''artistes/groupes
  FWB, budget global ≥ 20.000 €, cachets artistiques totaux ≥ 10.000 €. À VÉRIFIER
  DANS LES COMPTES GAZMATEK AVANT DE DÉPOSER : si les cachets sont sous 10.000 €,
  le dossier est irrecevable, point final.

  PIÈGE #1 — la procédure prend jusqu''à 5 MOIS après la date butoir. Un dépôt au
  5 février donne une réponse vers juin/juillet. Pour un festival d''été, il faut
  donc déposer en février de l''année MÊME du festival, et avoir la trésorerie pour
  avancer les frais. PIÈGE #2 — le vade-mecum « Aides aux structures de programmation
  » contient l''intégralité des critères d''analyse. Le télécharger et le suivre ligne
  à ligne.

  LEVIER — appeler Diane Dernouchamps AVANT le dépôt : c''est elle qui instruira le
  dossier électro. Sabrina Graci gère le suivi administratif des subventions en musiques
  actuelles.

  À TERME — viser le « Contrat de diffusion » pluriannuel : contrats de 3 ans (période
  2027/2029) et contrats de 5 ans dont le prochain dépôt est annoncé pour le dernier
  trimestre 2027 (période 2029/2033).

  '
