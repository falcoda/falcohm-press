  rationale: 'Le dispositif finance littéralement l''objet social de l''ASBL (organiser
    un festival de musiques actuelles), avec un agent public affecté aux musiques
    électroniques : le fit est maximal. La probabilité est tempérée par deux exigences
    dures — l''aide vise un organisateur PROFESSIONNEL développant des « activités
    artistiques professionnelles », or Falc''ohm est une structure bénévole ; et il
    faut prouver 7 concerts, 1/3 d''artistes FWB, 20.000 € de budget et 10.000 € de
    cachets. L''impact est maximal : subside récurrent, sésame de crédibilité qui
    débloque province, commune et fonds privés, et porte d''entrée vers le Contrat
    de diffusion pluriannuel.

    '
