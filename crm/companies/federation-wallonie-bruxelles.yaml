why_us: 'C''est LE dispositif public taillé pour ce que fait Gazmatek : l''« Aide
  aux structures de programmation » couvre explicitement l''organisation d''un festival
  de musique et d''une année/saison de concerts. Falc''ohm System coche les conditions
  de base : personne morale établie en Fédération Wallonie-Bruxelles (Genappe), aucun
  contrat-programme ni contrat de diffusion en cours, et un historique de plusieurs
  éditions — or le texte précise qu''en musiques actuelles « la priorité est accordée
  aux projets ayant déjà eu 2 éditions ou saisons précédentes ». Décisif : le Service
  des Musiques a une agente dédiée au secteur des MUSIQUES ÉLECTRONIQUES (Diane Dernouchamps).
  Le genre est donc un secteur d''instruction identifié, pas une exception à plaider.

  '
ask:
  type:
  - financial
  detail: '« Aide aux structures de programmation », volet FESTIVAL en musiques actuelles,
    aide ponctuelle portant sur une édition. Subvention de MINIMUM 5.000 € (versée
    en 1 fois si < 6.000 €, en 2 fois au-delà, le solde après justificatifs). Seuils
    éliminatoires pour un festival de musiques actuelles : au minimum 7 concerts dont
    au moins 1/3 d''artistes/groupes de la FWB, budget global ≥ 20.000 €, cachets
    artistiques totaux ≥ 10.000 €. Dossier via formulaire en ligne + budget prévisionnel
    (.xls) + grille de programmation (.docx) + comptes et bilan de la dernière édition.

    '
  realistic_value_eur: 6000
