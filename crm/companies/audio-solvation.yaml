why_us: 'Audio Solvation est à environ 1h15 de Genappe et détient la distribution
  mondiale (hors Asie) de PHL Audio — c''est donc le chemin le plus court et le plus
  concret vers les transducteurs français que Falc''ohm vise pour ses tops. Structure
  minuscule : le patron décide seul, en une conversation. Et l''intérêt est mutuel
  — un sound system belge visible, équipé en PHL et documenté publiquement, est exactement
  l''argument commercial qui manque à un distributeur qui doit vendre une marque française
  face aux Italiens dans le Benelux.'
ask:
  type:
  - discount
  - material
  - visibility
  detail: 'Compte revendeur / conditions ASBL sur les transducteurs PHL Audio pour
    l''équipement des tops multi horn entry, avec dotation partielle sur le premier
    jeu. Utiliser leur position de distributeur pour négocier en trio avec PHL Audio
    (fabricant). Contrepartie : marquage sur les façades, making-of du build et statut
    de référence Benelux démontrable.'
