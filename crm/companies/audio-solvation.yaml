  rationale: 'Fit réel mais étroit : ils portent essentiellement PHL Audio, donc ils
    ne couvrent qu''une partie du système (le médium/aigu des tops), pas le grave
    des subs horn. Probabilité bonne — micro-structure à 1h15, décideur unique, et
    un intérêt marketing direct à équiper un rig belge visible. Impact limité en euros
    mais c''est un levier de négociation utile : passer par eux peut débloquer PHL
    plus vite qu''un e-mail au fabricant.'
