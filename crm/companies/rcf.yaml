why_us: 'RCF est la seule cible de la catégorie dont la culture de sponsoring événementiel
  est prouvée à grande échelle : ils ont acheté les droits de dénomination de la RCF
  Arena de Reggio Emilia (10 000 à 100 000 spectateurs, plus grande salle de concert
  en plein air d''Europe) et en sont le main sponsor. Une entreprise qui met son nom
  sur un lieu de musique comprend immédiatement ce que Falc''ohm propose — pas besoin
  de leur expliquer la valeur d''une visibilité sur 10-15 événements et +10 000 festivaliers.
  C''est un interlocuteur qui parle déjà la langue du partenariat culturel, pas seulement
  celle du bon de commande.'
ask:
  type:
  - material
  - financial
  - visibility
  - discount
  detail: 'Partenariat de visibilité : dotation de transducteurs OEM et/ou d''amplification
    pour la nouvelle série de caissons, ou soutien financier au projet d''équipement,
    en échange d''un marquage « Powered by RCF » sur les façades et les racks et d''une
    visibilité sur l''ensemble des événements Gazmatek. Angle à privilégier : le sponsoring
    culturel, pas l''achat de composants.'
