  rationale: 'Fit moyen sur le produit : RCF vend surtout des systèmes finis, et ses
    transducteurs bruts sont réservés à un canal OEM peu ouvert aux petits volumes
    — ce n''est pas le fournisseur naturel d''un constructeur de caissons DIY. Mais
    c''est le meilleur profil « sponsor » de toute la catégorie, avec un antécédent
    spectaculaire (RCF Arena). D''où une probabilité honorable malgré la taille du
    groupe, à condition d''attaquer par la porte marketing/sponsoring et non par la
    porte commerciale.'
