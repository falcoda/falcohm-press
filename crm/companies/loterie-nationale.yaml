notes: 'RÈGLE ÉLIMINATOIRE : demande à soumettre au plus tard 3 MOIS AVANT l''événement.
  C''est le piège n°1 — un dépôt à 2 mois est irrecevable, quel que soit le projet.

  ÉLIGIBILITÉ « Prestige National » : réservé aux personnes morales de droit public
  ou privé belge à but désintéressé, minimum 1 an d''existence [OK — ASBL de 2020].
  « Proximity » est accessible aux personnes morales ET physiques.

  AUTRE CONDITION : l''événement ne peut pas viser un public exclusivement mineur.
  Gazmatek visant un public jeune, vérifier que la communication du dossier ne laisse
  pas croire à un événement pour mineurs.

  FRAIS INÉLIGIBLES (Prestige National) : assurances, taxes, carburant, consultance,
  frais de catering. → Bâtir le budget de la demande sur les cachets artistiques,
  la technique, la scène et la sécurité.

  CONTACTS : la Loterie Nationale ne publie AUCUN email ni téléphone de service subsides.
  Le seul canal est le portail de dépôt + le formulaire de contact générique. Ne pas
  inventer d''adresse.

  MÉCANIQUE DU PORTAIL : sauvegarde automatique pendant la saisie ; demandes non modifiables
  après soumission ; toute demande entamée mais non mise à jour pendant 6 mois est
  automatiquement supprimée.

  PISTE COMPLÉMENTAIRE : surveiller les appels à projets thématiques annuels (publiés
  vers mars). Celui sur le développement durable 2026 était doté de 1,5 M€, jusqu''à
  80.000 € par projet et 75 % du budget, et acceptait les « projets culturels, éducatifs
  ou participatifs qui sensibilisent les citoyens aux objectifs de développement durable
  ». Un festival éco-responsable qui fabrique et répare son propre matériel plutôt
  que d''acheter et jeter y a un angle réel. Le calendrier 2027 n''est pas encore
  publié.

  '
