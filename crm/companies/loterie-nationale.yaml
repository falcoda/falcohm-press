why_us: 'Le volet « Proximity » décrit Gazmatek presque mot pour mot. Il vise les
  événements ancrés localement, organisés par des acteurs de terrain, qui renforcent
  la cohésion sociale et la vie associative, et couvre explicitement « les initiatives
  culturelles accessibles et non commerciales (musique, humour, cinéma, théâtre de
  rue, projets pluridisciplinaires) » ainsi que « les événements en plein air ». Falc''ohm
  System est une ASBL non lucrative animée par 40+ bénévoles, qui organise des événements
  de musique en plein air rassemblant plus de 10.000 personnes : acteur de terrain,
  événement local, non commercial, cohésion sociale — les quatre cases sont cochées
  sans forcer le récit. La condition d''ancienneté (personne morale belge à but désintéressé,
  minimum 1 an d''existence) est largement acquise : l''ASBL existe depuis 2020.

  '
ask:
  type:
  - financial
  detail: 'Soutien financier « Proximity » via le portail de demande de subsides.
    La catégorie (Prestige National ou Proximity) est déterminée par la Loterie Nationale
    elle-même sur base des informations fournies : ne pas chercher à la choisir, remplir
    honnêtement. Conditions : demande introduite par une personne majeure, événement
    se déroulant en Belgique, public non exclusivement mineur, et demande soumise
    AU PLUS TARD 3 MOIS AVANT L''ÉVÉNEMENT. Frais explicitement inéligibles : assurances,
    taxes, carburant, consultance, catering → construire le budget de la demande sur
    les cachets, la technique, la scène et la production.

    '
