profile:
  activity: 'Entreprise publique fédérale dont une part statutaire des bénéfices est
    redistribuée en subsides d''utilité publique (culture, sport, social, développement
    durable). Deux canaux : les soutiens financiers permanents (Prestige National
    / Proximity) et des appels à projets thématiques annuels.'
