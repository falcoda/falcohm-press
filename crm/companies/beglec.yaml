  detail: 'Dotation ou prêt longue durée d''amplification Synq pour les nouveaux caissons,
    fourniture de câblage Hilec (câbles HP, connectique) et éventuellement de flightcases
    JV Case pour le transport du système. Contrepartie : marquage sur les racks, visibilité
    sur 10-15 événements/an et matériel en usage réel exploitable en communication.'
