  detail: 'Compte à tarif professionnel / prix dégressif quantité sur les 18XL1800
    et la série HF, dotation ou prise en charge partielle des transducteurs de la
    nouvelle série de caissons, et stock de membranes de rechange. Contrepartie :
    marquage sur les façades, mentions sur 10-15 événements/an et sur les prestations
    techniques de Falc''ohm.'
