profile:
  activity: Fabricant de haut-parleurs fondé à Milan en 1958, l'un des plus gros d'Europe
    (automobile + pro). La marque FaitalPRO, lancée en 2005, couvre le marché de la
    sonorisation professionnelle. Production en Italie (San Donato Milanese, Chieve)
    et en Hongrie.
  products:
  - Woofers 6" à 21" (18XL1800, 15FH500, 12FH500)
  - Moteurs de compression 1" à 3" (HF10AK, HF146, HF1440)
  - Médiums et large bande
  - Pavillons, membranes et kits de recone
