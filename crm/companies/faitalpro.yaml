why_us: 'FaitalPRO est le transducteur "rapport rendement/prix" par excellence des
  constructeurs de sound systems : le 18XL1800 et les moteurs HF14xx tournent dans
  une bonne partie des rigs DIY européens. La gamme couvre toute la chaîne d''un système
  (sub, médium, aigu) chez un seul fournisseur, ce qui répond directement au besoin
  de "cohérence de gamme" du projet. Faital fabrique aussi en Hongrie, donc en UE
  : argument made-in-EU cohérent avec le discours de l''ASBL.'
