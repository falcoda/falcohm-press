scoring:
  business_fit: 5
  partnership_probability: 4
  impact_if_successful: 7
  rationale: 'Le fit est réel mais exige une reformulation : Erasmus+ ne financera
    jamais un festival, il finance un projet d''éducation non formelle porté par des
    jeunes — il faut donc isoler le volet « transmission technique et échange européen
    » et le monter comme un projet autonome, avec des partenaires étrangers réels.
    La probabilité est basse-moyenne : le dossier est lourd (partenariat transnational,
    calendrier long, reporting européen) et l''ASBL n''a probablement pas d''expérience
    Erasmus+, ce qui pèse à l''évaluation. Mais l''impact est fort : les barèmes Erasmus+
    dépassent largement tous les subsides locaux réunis, et une première accréditation
    ouvre un accès pluriannuel simplifié.

    '
