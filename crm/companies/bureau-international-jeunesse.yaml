notes: "ÉCHÉANCES 2026 CONFIRMÉES (heures de Bruxelles, 12h00) : • Action clé 1 (échanges\
  \ de jeunes, mobilité des animateurs, participation des jeunes, mobilité du personnel\n\
  \  sportif) : 12 février 2026 [passée] et 1er OCTOBRE 2026 → projets débutant entre\
  \ le 1er janvier et le\n  31 mai 2027.\n• DiscoverEU volet inclusion : 12 février\
  \ 2026 [passée] et 1er octobre 2026. • Action clé 2 (partenariats de coopération\
  \ et simplifiés) : 5 mars 2026 [passée]. • Accréditation Action clé 1 : 29 septembre\
  \ 2026.\nPRÉREQUIS BLOQUANT : un échange de jeunes Erasmus+ suppose au minimum UN\
  \ PARTENAIRE ÉTRANGER conventionné. Sans partenaire identifié, le dossier du 1er\
  \ octobre est hors de portée. C'est le vrai goulot d'étranglement — s'y atteler\
  \ dès maintenant (réseaux sound system européens, festivals partenaires, plateforme\
  \ de recherche de partenaires Erasmus+).\nANGLE GAGNANT : ne pas présenter Gazmatek.\
  \ Présenter « un groupe de jeunes de moins de 30 ans qui conçoivent et fabriquent\
  \ leur propre système de sonorisation, et qui veulent confronter et transmettre\
  \ ce savoir-faire avec des collectifs européens équivalents ». C'est du texte Erasmus+\
  \ pur : éducation non formelle, apprentissage par les pairs, mobilité, participation\
  \ des jeunes.\nAPPUI GRATUIT : le BIJ dispose d'un espace « Info Mobilité » à Bruxelles,\
  \ accessible librement (lundi-jeudi 10h-12h et 13h-17h, vendredi 10h-12h et 13h-16h).\
  \ Y aller avec le projet en amont du dépôt.\nNON VÉRIFIÉ : les barèmes forfaitaires\
  \ exacts (voyage, séjour, coûts organisationnels) n'ont pas été extraits ; la valeur\
  \ de 15.000 € est un ordre de grandeur. Consulter la page « Budget » du BIJ.\n"
