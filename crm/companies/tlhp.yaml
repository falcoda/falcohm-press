notes: 'L''e-mail info@toutlehautparleur.com a été lu sur la page « distribution »
  de PHL Audio (fabricant dont TLHP est le distributeur officiel), qui l''affiche
  en clair — le site de TLHP lui-même bloque la lecture automatisée (HTTP 403). Une
  adresse contact@toutlehautparleur.com circule aussi sur des annuaires mais N''A
  PAS pu être lue sur une page : non reprise ici. Deux adresses TLHP apparaissent
  selon les sources (Bourgbarré 35230 et Vern-sur-Seiche 35770) : celle retenue est
  le siège tel qu''indiqué par PHL et par Oberton (2 rue des Fermes Gauloises, 35230
  Bourgbarré). Oberton les désigne comme distributeur France/Monaco/Espagne/Italie
  — aucun distributeur Benelux chez Oberton, donc TLHP est aussi la porte d''entrée
  logique pour cette marque. À CREUSER : la page « commande administration » (procédure
  pour structures publiques/associatives) confirme qu''ils savent facturer une entité
  non commerciale — argument à utiliser dans l''approche.'
