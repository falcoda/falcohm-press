why_us: 'TLHP est le distributeur francophone qui référence en un seul catalogue TOUTES
  les marques que Falc''ohm doit arbitrer : B&C, 18Sound, FaitalPRO, Beyma, PHL, Oberton,
  Celestion… Plutôt que de négocier six accords fabricants incertains, un seul accord
  « tarif revendeur/pro » chez TLHP fait baisser la facture de l''intégralité de la
  nomenclature — transducteurs, filtres, connectique, kits de recone — et ce de façon
  récurrente sur les 5-10 ans du projet. C''est le levier le plus rentable du module.
  Entreprise familiale depuis plus de 30 ans, francophone : le dossier arrive dans
  la bonne langue, chez quelqu''un qui décide. Ils disposent en plus d''une procédure
  de commande dédiée aux administrations et structures publiques, signe qu''ils savent
  traiter des entités non commerciales comme une ASBL.'
ask:
  type:
  - discount
  - material
  - consumables
  detail: 'Ouverture d''un compte à tarif revendeur / professionnel sur l''ensemble
    du catalogue (transducteurs, filtres, connectique, membranes), avec conditions
    dégressives sur le volume nécessaire à l''équipement de la série complète de subs
    horn et de tops. Idéalement complété par une dotation partielle en composants
    pour le premier caisson. Contrepartie : marquage sur les façades, making-of documenté
    du build et visibilité sur 10-15 événements et 27 000 abonnés.'
