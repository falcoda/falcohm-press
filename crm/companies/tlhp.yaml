profile:
  activity: 'Distributeur français de composants de haut-parleurs, entreprise familiale
    basée à Bourgbarré près de Rennes. Se présente comme le premier vendeur de haut-parleurs
    en Europe : plus de 14 000 références en stock, entrepôt de 1 500 m². Distributeur
    officiel de PHL Audio et d''Oberton pour la zone France/Europe du Sud.'
