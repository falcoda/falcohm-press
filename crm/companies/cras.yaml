why_us: 'Signal n°1 réuni : Cras est déjà ''main partner'' d''un club sportif (SV
  Zulte Waregem) avec un contrat prolongé de cinq ans — ils savent signer des partenariats
  de visibilité pluriannuels, exactement le format que Falc''ohm propose sur 5-10
  ans. Et surtout, ils ont une succursale à Rebecq (~25 km de Genappe) et une à Trazegnies
  : l''approvisionnement récurrent en multiplex peut se faire en local, sans logistique
  lourde. Gamme multiplex complète et certifiée.'
ask:
  type:
  - material
  - discount
  - visibility
  detail: 'Partenariat pluriannuel calqué sur leur logique ''main partner'' : remise
    pro permanente sur le multiplex bouleau via la succursale de Rebecq, accès aux
    chutes/fins de série, en échange d''une visibilité sur le sound system Falc''ohm
    et sur les 10-15 événements Gazmatek/an. Argument : ils sponsorisent déjà le sport,
    la musique électronique leur ouvre une audience jeune (27 000 abonnés) qu''un
    club de foot ne leur donne pas.'
