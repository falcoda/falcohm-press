profile:
  activity: 'Groupe familial du bois basé à Waregem (racines en 1878), exploitant
    un réseau de 12 succursales ''Cras Woodshops'' en Belgique, dont Rebecq et Trazegnies
    en Wallonie. Négoce de bois, panneaux et matériaux : large gamme de multiplex/contreplaqué
    (intérieur, milieu humide, rainuré, ignifuge), en grande partie certifiée FSC
    et PEFC. Propose le collage de panneaux jusqu''à 4200 x 1300 mm.'
