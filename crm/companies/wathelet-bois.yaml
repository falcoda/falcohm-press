why_us: 'Entreprise familiale de plus de 80 ans qui annonce elle-même se déplacer
  en Brabant wallon : Falc''ohm est littéralement dans sa zone de chalandise. Structure
  petite et locale — le patron décide seul, ce qui est le profil de cible le plus
  rentable. Ils ont un atelier (sciage, rabotage), donc des chutes de panneaux et
  de bois exploitables. L''adresse email est une adresse Outlook personnelle, signe
  d''une structure très artisanale : l''approche humaine directe passera mieux qu''un
  dossier corporate.'
