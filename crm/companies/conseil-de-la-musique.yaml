notes: 'CE N''EST PAS UN FINANCEUR. Ne rien lui demander d''autre que de l''expertise
  — s''y tromper décrédibiliserait immédiatement l''ASBL auprès d''un acteur central
  du secteur.

  POURQUOI C''EST LE PREMIER APPEL À PASSER : le dossier FWB « Aide aux structures
  de programmation » est le plus rentable du portefeuille (minimum 5.000 €, potentiellement
  récurrent, et sésame pour tout le reste) et aussi le plus technique : seuils éliminatoires,
  vade-mecum, grille de programmation, budget prévisionnel normalisé. Le Conseil de
  la Musique organise précisément des sessions pour apprendre à monter ces dossiers,
  et Musiscope offre du conseil individuel administratif, juridique et financier.
  C''est du temps gratuit qui achète de la probabilité sur un dossier à cinq chiffres.
  Le faire AVANT de déposer, pas après un refus.

  BÉNÉFICE SECONDAIRE : l''entrée dans le réseau sectoriel (Maison des Musiques, Larsen,
  IDLM, Fête de la Musique). Une ASBL invisible du secteur professionnel est une ASBL
  qui ne sera pas reconnue comme « professionnelle » par la Commission des Musiques
  de la FWB — or c''est précisément le critère sur lequel Falc''ohm est le plus fragile.
  Se rendre visible ici a donc un effet direct sur le dossier FWB.

  CONTACTS : le site publie les emails de l''équipe avec une obfuscation « [AT] ».
  Seul Christophe Hars (coordination Musiscope) est directement pertinent. La direction
  (Claire Monville) est identifiée mais SANS email publié — ne pas en inventer un.

  NON VÉRIFIÉ : l''adresse générique info@conseildelamusique.be et l''adresse musiscope@conseildelamusique.be
  ont été rapportées par des sources secondaires mais n''ont pas pu être confirmées
  caractère par caractère sur une page officielle ouverte. Ne pas les utiliser sans
  vérification. Le téléphone général rapporté est le 02 550 13 20 (Maison des Musiques,
  Rue Lebeau 39, 1000 Bruxelles).

  VOIR AUSSI : Court-Circuit — Fédération des Musiques Actuelles (www.court-circuit.be)
  maintient l''annuaire de référence des aides financières du secteur musical belge
  francophone. C''est la source à consulter en veille.

  '
