why_us: 'Ce n''est pas un financeur — et c''est précisément pour cela qu''il a sa
  place ici. Le Conseil de la Musique est l''organisme qui, gratuitement, apprend
  à monter les dossiers des autres. Il organise des sessions dédiées « Conseils subventions
  — Fédération Wallonie-Bruxelles & bourses diverses » et propose, via Musiscope,
  du conseil individuel administratif, juridique et financier aux professionnels du
  secteur musical. Or le dossier le plus lourd et le plus rentable de tout ce portefeuille
  — l''Aide aux structures de programmation de la FWB, minimum 5.000 €, avec ses seuils
  éliminatoires et son vade-mecum — est exactement le type de dossier que ces sessions
  servent à préparer. Passer par eux avant de déposer, c''est convertir quelques heures
  gratuites en probabilité de succès sur un dossier à cinq chiffres.

  '
ask:
  type:
  - services
  detail: '(1) S''inscrire à la prochaine session « Conseils subventions — Fédération
    Wallonie-Bruxelles & bourses diverses » (une session était programmée le 31 août
    2026 selon l''agenda du site) AVANT de préparer le dossier FWB « Aide aux structures
    de programmation ». (2) Solliciter un conseil individuel Musiscope (administratif,
    juridique, financier) pour faire relire le dossier et vérifier les seuils éliminatoires
    (7 concerts, 1/3 d''artistes FWB, 20.000 € de budget, 10.000 € de cachets). Aucune
    demande financière : ce qu''on vient chercher ici, c''est de l''expertise et une
    mise en réseau sectorielle.

    '
