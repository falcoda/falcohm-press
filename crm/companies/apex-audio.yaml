  detail: 'Dotation ou prêt longue durée d''un rack CloudPower + un processeur Intelli-X
    pour les nouveaux subs horn et les tops, avec accompagnement au calage système.
    À défaut : conditions constructeur/OEM. Contrepartie : marquage « Powered by APEX
    » sur les racks et les façades, statut de référence belge démontrable pour leurs
    prospects, et accès au matériel en usage réel (nuits entières à fort niveau) comme
    banc d''essai.'
