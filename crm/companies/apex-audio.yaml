why_us: 'C''est le seul fabricant d''amplification et de DSP conçu, assemblé et testé
  EN BELGIQUE — à environ 1h30 de Genappe. Il couvre d''un coup deux des trois besoins
  de la page « needs » du dossier audio : amplification et traitement/DSP. Et surtout,
  un détail décisif lu sur leur propre page « where to buy » : APEX n''a AUCUN distributeur
  en Belgique (« is still looking for the right distribution partner for this country
  »). Ils vendent donc en direct sur leur marché domestique et n''ont pas de vitrine
  belge. Un sound system associatif visible sur 10-15 événements/an, équipé en CloudPower
  et calé en Intelli-X, est exactement la référence terrain qui leur manque — et ça
  ne leur coûte pas de marge distributeur.'
