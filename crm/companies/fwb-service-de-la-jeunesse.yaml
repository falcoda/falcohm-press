why_us: 'Falc''ohm System est une ASBL non reconnue par l''Administration générale
  de la Culture — c''est précisément le profil que la circulaire « Soutien aux projets
  jeunes » rend éligible aux actions 1 et 2. Mieux : l''ASBL réunit 40+ bénévoles
  et un public jeune, ce qui ouvre une seconde porte, bien plus lucrative. Le dispositif
  accepte en effet « tout groupe composé de jeunes de moins de 30 ans — minimum 6
  jeunes — qui se constitue en association de fait », avec une association de référence
  identifiée comme coordinatrice du projet : Falc''ohm peut jouer ce rôle d''association
  de référence pour un collectif de ses jeunes bénévoles, ce qui débloque les actions
  3 (« Créations jeunes », jusqu''à 9.000 €) et 4 (« Diffusion jeunes », jusqu''à
  7.500 €). Le pôle technique — des jeunes qui fabriquent eux-mêmes leurs enceintes
  et se transmettent le savoir-faire — est un projet d''« expression » et de « création
  collective » par et pour les jeunes au sens littéral de la circulaire.'
ask:
  type:
  - financial
  detail: "Appel à projets « Soutien aux projets jeunes », dépôt EXCLUSIVEMENT via\
    \ la plateforme SUBside (https://www.subside.cfwb.be/sub/tiers/authentification)\
    \ — « aucune suite ne sera donnée aux demandes adressées par une autre voie ».\
    \ Deux voies : (A) En tant qu'ASBL non reconnue par l'AG Culture → accès aux ACTIONS\
    \ 1 et 2 uniquement.\n    Action 1 « Coopération jeunes » : 1.000 à 3.000 €. Action\
    \ 2 « Expression jeunes » : 3.000 à 6.500 €.\n(B) En constituant un groupe d'au\
    \ moins 6 jeunes de moins de 30 ans en association de fait, avec Falc'ohm\n  \
    \  System comme association de référence → accès aux ACTIONS 3 et 4.\n    Action\
    \ 3 « Créations jeunes » : 4.000 à 9.000 €. Action 4 « Diffusion jeunes » : 3.750\
    \ à 7.500 €.\nAngle le plus fort : action 2 ou 3 sur la construction du sound\
    \ system par les jeunes bénévoles (expression, création collective, transmission\
    \ technique)."
  realistic_value_eur: 5000
