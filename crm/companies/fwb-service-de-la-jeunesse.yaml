notes: 'CALENDRIER — 4 trains par an, la plateforme SUBside n''ouvre qu''UN MOIS avant
  la clôture : Train 1 : 15 décembre → 15 janvier | Train 2 : 15 février → 15 mars
  | Train 3 : 15 mai → 15 juin | Train 4 : 15 août → 15 septembre. DÉPÔT : exclusivement
  via SUBside. « Aucune suite ne sera donnée aux demandes adressées par une autre
  voie. » PIÈGE TECHNIQUE : la plateforme SUBside a changé d''URL en 2025 ; les opérateurs
  disposant déjà d''un compte DOIVENT changer leur mot de passe à la première connexion
  à la nouvelle version — étape obligatoire avant tout dépôt. Créer/réactiver le compte
  SUBside AVANT le 15 août, pas le 14 septembre. ÉLIGIBILITÉ — LE POINT CLÉ : en tant
  qu''ASBL, Falc''ohm n''a accès QU''AUX ACTIONS 1 ET 2 (plafond 6.500 €). Pour viser
  les actions 3 (jusqu''à 9.000 €) et 4 (jusqu''à 7.500 €), il faut passer par « tout
  groupe composé de jeunes de moins de 30 ans — minimum 6 jeunes — qui se constitue
  en association de fait », Falc''ohm jouant le rôle d''association de référence/coordinatrice.
  Avec 40+ bénévoles, c''est faisable — mais cela suppose de formaliser le collectif
  et de vérifier la condition d''âge (< 30 ans). PIÈCES : circulaire « soutien aux
  projets jeunes » (.pdf), formulaire/grille Actions 1 à 4 (.docx), budget type (.xls),
  convention de parrainage (.docx), FAQ (.pdf) — tous téléchargeables sur la page
  de l''appel. NON VÉRIFIABLE : le Service de la Jeunesse publie le nom et le téléphone
  de Virginie Huybrecht mais AUCUN email nominatif. Passer par le téléphone (02 413
  40 17) ou l''adresse générique.'
