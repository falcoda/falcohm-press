  rationale: 'Le fit est réel mais indirect : le dispositif ne finance pas un festival
    en tant que tel, il finance un projet PORTÉ PAR ET POUR des jeunes — il faut donc
    reformuler l''angle (construction du sound system, transmission technique aux
    bénévoles, création collective) plutôt que présenter Gazmatek tel quel. La probabilité
    est correcte : l''ASBL est explicitement éligible aux actions 1-2 de par son statut
    de non- reconnue, et la voie du collectif de jeunes en association de fait ouvre
    les montants supérieurs. Les 4 sessions annuelles autorisent en outre un dépôt
    raté sans perdre l''année. Impact moyen-fort : jusqu''à 9.000 € et, surtout, une
    première reconnaissance publique fédérale qui crédibilise le dossier Musiques.'
