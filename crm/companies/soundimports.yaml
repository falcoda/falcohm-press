  detail: 'Compte professionnel / revendeur avec remise permanente sur l''ensemble
    de la nomenclature (transducteurs, modules d''ampli, DSP, composants de filtre,
    connectique), plus une dotation partielle en composants pour la première série
    de caissons. Contrepartie : documentation complète du build (photos, mesures,
    making-of) exploitable par eux en contenu et en galerie DIY, marquage sur les
    façades et visibilité sur 10-15 événements et 27 000 abonnés.'
