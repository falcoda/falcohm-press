why_us: 'C''est la cible la plus stratégique de tout le module audio. Un seul compte
  chez SoundImports couvre TOUTE la nomenclature d''un caisson : les transducteurs
  (ils référencent les grandes marques de sono), les modules d''amplification et DSP,
  les composants de filtre, la connectique et même les outils de mesure. Là où un
  fabricant italien ne peut offrir qu''une remise sur sa propre gamme, eux peuvent
  porter le prix de tout le projet. Ils sont aux Pays-Bas (livraison rapide, même
  fuseau, même TVA intracommunautaire), la structure est jeune (2015) et son fondateur
  Martijn Ouwerkerk dirige toujours l''entreprise — pas de comité. Et ils ont déjà
  le réflexe : ils organisent chaque année une DIY Competition, entretiennent une
  galerie de projets communautaires et soutiennent les créateurs de contenu en produits
  et en support technique. Une ASBL belge qui construit des subs à pavillon et documente
  le build est littéralement leur contenu rêvé.'
