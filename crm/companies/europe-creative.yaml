notes: 'STATUS `discarded` ASSUMÉ — et c''est le résultat de l''analyse, pas un abandon. La question posée
  était « Europe Créative est-il réaliste à cette échelle ? ». La réponse est non, et la fiche est conservée
  en `discarded` pour documenter ce non et éviter qu''on y revienne dans six mois. Le seul geste utile
  reste dans `next_action` : un mail à Nathalie Marchal pour du conseil gratuit. Rien d''autre.

  VERDICT SANS DÉTOUR : ne pas candidater. Europe Créative n''est pas dimensionné pour une ASBL bénévole.
  Les projets de coopération du volet Culture supposent un consortium de plusieurs structures de pays
  différents, un cofinancement de l''ordre de 20 à 40 %, une capacité financière démontrée et un dossier
  lourd en anglais. Le taux de sélection est bas et les candidats sont des institutions professionnelles
  avec des chargés de projets européens dédiés. Cette fiche est là pour éviter qu''on y perde du temps
  — et pour exploiter la seule chose qui a de la valeur ici : le conseil.

  CE QU''ON VIENT CHERCHER : Nathalie Marchal est l''experte des financements culturels européens côté
  FWB. Un rendez-vous gratuit avec elle permet de cartographier ce qui EST accessible (schémas de mobilité
  redistribués par des tiers, appels de moindre envergure, opportunités de rejoindre un consortium existant
  en tant que partenaire secondaire plutôt que chef de file). Rejoindre un consortium comme partenaire
  — et non le piloter — est la seule voie européenne réaliste à moyen terme.

  ALTERNATIVE EUROPÉENNE RÉELLE : voir la fiche `bureau-international-jeunesse` (Erasmus+ Jeunesse). C''est
  LA porte européenne praticable à notre échelle, avec des deadlines concrètes et des dossiers d''un ordre
  de grandeur plus légers.

  NOTE : le volet MEDIA (Stéphanie Leempoels, stephanie.leempoels@cfwb.be, +32 (0)2 413 34 91) concerne
  l''audiovisuel et le cinéma — sans objet pour nous.

  '
