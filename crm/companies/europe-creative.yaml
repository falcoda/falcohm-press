why_us: 'Soyons honnêtes : Europe Créative n''est PAS accessible à Falc''ohm System aujourd''hui, et prétendre
  le contraire ferait perdre des mois. Les projets de coopération du volet Culture exigent un consortium
  transnational de plusieurs structures professionnelles de pays différents, un cofinancement de 20 à
  40 %, une capacité financière et administrative auditée, et un dossier en anglais de plusieurs dizaines
  de pages. Une ASBL bénévole de 2020 sans salarié n''y a aucune chance et le sait. En revanche, ce que
  ce bureau offre gratuitement a une valeur réelle : un rendez-vous de conseil avec une experte des financements
  culturels européens, qui connaît les appels, les consortiums en formation et les alternatives plus accessibles.
  C''est cela qu''on va chercher ici — de l''expertise, pas un chèque.

  '
ask:
  type:
  - services
  detail: 'Solliciter un rendez-vous de conseil gratuit auprès de Nathalie Marchal (responsable du volet
    Culture) pour (a) confirmer qu''Europe Créative est hors de portée à ce stade et à quelles conditions
    cela changerait, et (b) identifier les dispositifs européens réellement accessibles à une petite structure
    — notamment les schémas de mobilité et de soutien aux artistes émergents financés par Europe Créative
    mais redistribués par des intermédiaires, qui ne demandent pas de consortium. Aucune candidature directe
    à Europe Créative n''est à envisager avant que l''ASBL n''ait au moins un salarié et des comptes audités.

    '
