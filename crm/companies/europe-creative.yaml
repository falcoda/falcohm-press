  rationale: 'Le fit est faible : Europe Créative finance la coopération culturelle transnationale entre
    structures professionnelles, pas l''organisation d''un festival local par une ASBL bénévole. La probabilité
    est de 1 sur 10, et ce n''est pas de la prudence — c''est un constat : le programme exige un consortium
    multi-pays, un cofinancement substantiel, une capacité administrative auditée et un dossier en anglais.
    Y candidater aujourd''hui serait un pur gaspillage de temps bénévole. L''impact serait évidemment
    considérable en cas de succès (six chiffres), d''où la note élevée, mais l''espérance mathématique
    reste proche de zéro. La fiche n''existe que pour une raison : capter le CONSEIL GRATUIT du desk,
    qui est réel et utile.

    '
