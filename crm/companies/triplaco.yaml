why_us: 'Ils annoncent le multiplex bouleau en qualités BB et CP en stock — le coeur
  du besoin. Au-delà du panneau brut, ils font la transformation (découpe, défonçage,
  perçage) : le potentiel dépasse la simple fourniture, ils peuvent livrer des pièces
  d''enceintes prêtes à assembler. L''enceinte de sound system est aussi une vitrine
  idéale pour un spécialiste du panneau décoratif et acoustique : un sound system
  Falc''ohm portant leur nom sur 10-15 événements/an est une démonstration produit
  grandeur nature.'
