profile:
  activity: 'Spécialiste du panneau décoratif de haute qualité (groupe Lefevere, historique
    familial depuis 1830 à Harelbeke). Distribue et transforme le plaatmateriaal :
    multiplex, MDF, OSB, panneaux agglomérés, softboard, panneaux plaqués et mélaminés.
    Assure aussi la transformation : découpe, défonçage, perçage, collage à plat,
    postforming, laquage, panneaux acoustiques.'
  products:
  - Multiplex / contreplaqué (dont bouleau, qualités BB et CP)
