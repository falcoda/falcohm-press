  rationale: 'Le fit est potentiellement bon — une subvention par représentation versée
    à l''organisateur, pour une structure qui programme 10 à 15 événements par an,
    c''est un flux récurrent et non un one-shot — mais il repose sur une inconnue
    majeure : rien sur les pages publiques ne confirme que les MUSIQUES ACTUELLES
    sont éligibles au Catalogue Diffusion, et le régime général des Tournées Art et
    Vie les excluait historiquement. La probabilité est donc basse tant que ce point
    n''est pas tranché, et elle est encore réduite par le prérequis de labellisation,
    qui est une procédure en soi. À traiter comme une piste à qualifier par un appel
    téléphonique, pas comme un dossier à monter en l''état.

    '
