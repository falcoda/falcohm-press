why_us: 'C''est le seul dispositif du portefeuille qui ne finance pas le festival
  mais fait BAISSER le coût de sa programmation — une logique complémentaire, et donc
  cumulable, avec l''Aide aux structures de programmation. Le principe : un diffuseur
  labellisé qui programme une production inscrite au Catalogue Diffusion reçoit une
  subvention par représentation. Changement décisif entré en vigueur au 1er janvier
  2025 : « les subventions à la diffusion seront désormais versées au diffuseur /
  programmateur » — auparavant elles transitaient par l''artiste. Autrement dit, c''est
  désormais l''organisateur, donc Falc''ohm, qui encaisse. Pour une ASBL qui programme
  régulièrement (10-15 événements par an), une subvention récurrente par date représente
  un flux potentiellement supérieur à un subside ponctuel.

  '
ask:
  type:
  - financial
  detail: 'Étape 1 — obtenir la LABELLISATION de diffuseur et s''inscrire sur la plateforme
    TARA (https://tara.cfwb.be/). C''est un prérequis absolu : sans label, aucune
    aide. Étape 2 — demander un QUOTA de diffusion (enveloppe budgétaire réservée
    pour une année civile) : les quotas se demandent en SEPTEMBRE et sont attribués
    en DÉCEMBRE. Étape 3 — programmer des productions issues du Catalogue Diffusion
    et percevoir la subvention par représentation. AVANT TOUTE CHOSE : faire confirmer
    par le Service de la Diffusion que les MUSIQUES ACTUELLES sont bien couvertes
    par le Catalogue Diffusion — ce point n''a pas pu être établi sur les pages publiques
    et conditionne l''intérêt de toute la démarche.

    '
