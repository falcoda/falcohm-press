notes: "FICHE À QUALIFIER — À LIRE AVANT D'INVESTIR DU TEMPS.\nLE POINT DE BLOCAGE\
  \ : le régime général des « Tournées Art et Vie » s'applique historiquement à l'ensemble\
  \ des disciplines des arts de la scène « à l'exclusion des disciplines relevant\
  \ de la musique classique (programme spécifique) ET DES MUSIQUES ACTUELLES ». Or\
  \ la page « Aides aux diffuseurs » mentionne un Catalogue Diffusion couvrant « Arts\
  \ visuels, Arts vivants et Musique », sans préciser les genres, et Court-Circuit\
  \ — la fédération des musiques actuelles — publie des actualités sur les évolutions\
  \ du dispositif Art&Vie, ce qui suggère qu'il concerne bien ses membres. CONTRADICTION\
  \ NON RÉSOLUE au 14/07/2026. Un appel au 02/413.3000 la tranche en cinq minutes.\
  \ Ne rien monter avant.\nSI LA RÉPONSE EST POSITIVE, la mécanique est la suivante\
  \ : 1. LABELLISATION du diffuseur + inscription sur la plateforme TARA (https://tara.cfwb.be/).\
  \ Prérequis absolu. 2. DEMANDE DE QUOTA — « certains diffuseurs labélisés disposent\
  \ d'un ou de deux quotas de diffusion pour une\n   année civile », constituant «\
  \ une enveloppe budgétaire réservée ». Les quotas se demandent en SEPTEMBRE et\n\
  \   sont attribués en DÉCEMBRE. C'est une échéance annuelle à ne pas rater.\n3.\
  \ PROGRAMMATION obligatoire de productions inscrites au Catalogue Diffusion — on\
  \ ne subventionne pas\n   n'importe quel artiste, uniquement ceux du catalogue.\
  \ C'est une contrainte de programmation réelle.\n\nRÉFORME 2025 (l'élément qui rend\
  \ cette fiche intéressante) : depuis le 01/01/2025, « les subventions à la diffusion\
  \ sont versées au diffuseur / programmateur » et non plus à l'artiste. C'est l'organisateur\
  \ qui touche.\nCUMUL : ce dispositif est complémentaire de l'Aide aux structures\
  \ de programmation (fiche `federation-wallonie-bruxelles`) — l'un subventionne l'édition,\
  \ l'autre chaque représentation. Vérifier toutefois auprès du service qu'il n'y\
  \ a pas d'incompatibilité, la FWB excluant généralement le double subventionnement\
  \ d'une même dépense.\nCONTACTS : aucun contact nominatif du Service de la Diffusion\
  \ n'est publié. Seul le numéro général de la Création artistique est disponible\
  \ : 02/413.3000 (jours ouvrables, 8h30-17h). Page contacts : https://creationartistique.cfwb.be/a-propos/contacts.\
  \ Ne pas inventer d'adresse email.\n"
