notes: 'ORDRE D''ATTAQUE : viser Michaël Rouffiange EN PREMIER (Festivités + Jeunesse
  = le périmètre exact de Gazmatek), puis Christophe Balestrie (Culture) en second
  appui, et n''aller vers le Bourgmestre Gérard Couronné (Finances et budget) qu''une
  fois l''échevin acquis — c''est lui qui arbitre l''inscription budgétaire. ARGUMENT
  CENTRAL À UTILISER : « chaque euro que Genappe met, le Brabant wallon le double
  » (dispositif provincial Place aux jeunes, plafond 5.000 €, réservé aux cachets
  artistiques et à leurs besoins logistiques et techniques, pour un public 10-20 ans).
  C''est l''argument le plus efficace face à un échevin : il transforme une dépense
  communale en investissement à effet multiplicateur. Le projet est formellement porté
  par la commune mais « il peut être porté par une association locale ». ATTENTION
  — INCOHÉRENCE D''ADRESSE À VÉRIFIER : le siège de l''ASBL est indiqué à 1473 Genappe,
  or l''administration communale est à 1470 Genappe (Espace 2000, 3). Le code 1473
  correspond à un village de l''entité (Glabais/Ways) : la commune de rattachement
  est bien Genappe, mais confirmer avant tout envoi officiel. NON VÉRIFIÉ : aucun
  règlement communal de subventionnement des associations n''est publié en ligne,
  et aucun agent du service Culture n''est nommément identifiable sur le site. La
  page « Primes communales » (https://www.genappe.be/je-trouve/primes-communales)
  n''a pas été ouverte et pourrait contenir un règlement. Il faut passer par les échevins,
  pas par un formulaire. ANGLE COMPLÉMENTAIRE : l''« ASBL des Salles Communales »
  relève de l''échevin de la Culture — piste pour un accès à une salle ou à du matériel
  à coût réduit.'
