why_us: 'Falc''ohm System est une ASBL genappienne : c''est la commune de son siège
  social. Une commune soutient en priorité les associations de son territoire, et
  un festival de +10.000 personnes est l''un des événements les plus visibles de l''entité
  — c''est un argument de rayonnement communal direct. Deux échevinats sont concernés
  et doivent être travaillés séparément : Christophe Balestrie (Culture, Bibliothèque,
  ASBL des Salles communales) et Michaël Rouffiange (Festivités, Jeunesse) — ce dernier
  est le plus aligné, puisqu''il cumule exactement les deux compétences de Gazmatek.
  Enjeu stratégique majeur : la commune est la CLÉ D''ACCÈS au dispositif provincial
  « Place aux jeunes », dans lequel chaque euro communal est doublé par le Brabant
  wallon. Un euro obtenu ici en vaut donc deux.'
ask:
  type:
  - financial
  - material
  - visibility
  detail: '(1) Subside communal direct à l''ASBL, inscrit au budget communal — montant
    à négocier avec l''échevin des Festivités/Jeunesse et validé par le Bourgmestre
    (qui détient les Finances et le budget). (2) SURTOUT : obtenir un engagement financier
    de la commune dans le cadre de « Place aux jeunes » (Province du Brabant wallon),
    où chaque euro investi par la commune est doublé par la Province, dans la limite
    de 1.000 à 5.000 €, et affecté aux cachets artistiques et à leurs besoins en logistique
    et technique. C''est le meilleur rapport effort/rendement du portefeuille local.
    (3) Appui matériel et logistique : prêt de matériel communal, mise à disposition
    de terrain, soutien sécurité/propreté, facilitation des autorisations.'
