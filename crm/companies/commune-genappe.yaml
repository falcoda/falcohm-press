scoring:
  business_fit: 7
  partnership_probability: 7
  impact_if_successful: 5
  rationale: 'Le fit est bon sans être parfait : une commune de cette taille n''a
    pas de ligne budgétaire dédiée aux festivals de musique électronique, mais elle
    a un échevin qui cumule Festivités et Jeunesse et une ASBL locale qui fait rayonner
    l''entité au-delà de ses frontières — l''argument politique est facile à porter.
    La probabilité est élevée : c''est le niveau de pouvoir le plus accessible, le
    contact est direct et nominatif, et le Bourgmestre détient lui-même les Finances.
    L''impact financier direct reste modeste (quelques milliers d''euros), mais il
    est sous-estimé : c''est un effet de levier, puisque l''engagement communal est
    la condition d''accès à « Place aux jeunes » où la Province double la mise, et
    qu''un soutien communal crédibilise tous les dossiers supérieurs (Province, FWB).'
deadlines:
- what: 'Aucune date de dépôt de subside communal publiée sur le site. Un subside
