  activity: 'Pouvoir communal dont dépend le siège social de Falc''ohm System ASBL
    (Rue des Croix du Feu 4, 1473 Genappe). Administration communale : Espace 2000,
    3 — 1470 Genappe. Le Collège communal dispose d''échevinats distincts pour la
    Culture d''une part, et pour les Festivités et la Jeunesse d''autre part.'
