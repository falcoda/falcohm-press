  rationale: 'Fit élevé et ciblé : BMS ne couvre pas tout le système mais il couvre
    l''endroit exact où la conception de Falc''ohm est la plus exigeante (les moteurs
    des tops à pavillon). Petite structure allemande avec une gérante nommée et un
    e-mail direct sur l''Impressum — le décideur est joignable en une étape, ce qui
    fait monter la probabilité au-dessus des géants italiens. Aucun antécédent de
    sponsoring trouvé : l''accord réaliste est d''abord tarifaire, la dotation viendrait
    ensuite.'
