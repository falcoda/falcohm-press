    plane, très utilisés dans les tops à pavillon et les line arrays.
  products:
  - Moteurs de compression 1" à 4" à onde plane (4550, 4592ND, 4594HE)
  - Drivers coaxiaux néodyme (4594, 4592) — deux voies dans un seul moteur
  - Woofers néodyme et ferrite 8" à 18" (18N862, 12N830)
  - Pavillons et membranes de rechange
