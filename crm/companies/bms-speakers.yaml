  detail: 'Conditions professionnelles / prix quantité sur les moteurs de compression
    et coaxiaux pour les tops multi horn entry, dotation ou co-financement d''un jeu
    de moteurs, et stock de membranes de rechange pour la maintenance. Contrepartie
    : marquage sur les façades, visibilité sur 10-15 événements/an et documentation
    technique du build (making-of) valorisable pour eux.'
