why_us: 'PlayRight+ soutient les projets et organisations « qui mettent la position
  de l''artiste-interprète en avant ou contribuent positivement à la communauté artistique
  ». Gazmatek programme et rémunère des artistes-interprètes (DJs, live acts) sur
  un sound system construit et opéré par des bénévoles formés en interne : c''est
  littéralement un projet qui fait vivre des interprètes et qui transmet un savoir-faire
  à la communauté artistique. Deux des axes éligibles annoncés collent directement
  — « soutien aux groupements d''intérêts » et « transmission et archivage du patrimoine
  culturel » — ce dernier étant l''angle par lequel la fabrication artisanale d''enceintes
  et sa transmission technique peuvent être défendues.

  '
ask:
  type:
  - financial
  detail: '« Soutien aux projets » de la Commission PlayRight+, déposé via le portail
    dédié (https://portal.playright.be/PR_Th/login). Deux sessions annuelles : 31
    mars et 30 septembre. Les domaines éligibles publiés sont : défense des intérêts
    des artistes-interprètes ; éducation et information sur les droits ; soutien aux
    groupements d''intérêts ; promotion et internationalisation ; transmission et
    archivage du patrimoine culturel. Le département Affaires culturelles accompagne
    les porteurs de projet dans la préparation de leur dossier — utiliser ce canal
    avant de déposer.

    '
