  rationale: 'Le fit est moyen : PlayRight+ finance des projets qui servent la CAUSE
    des artistes-interprètes (défense de leurs droits, information, patrimoine), pas
    l''organisation d''un festival en soi. Il faut donc réécrire le projet sous un
    angle qui n''est pas le nôtre spontanément — ce qui est faisable via la transmission
    du savoir-faire technique et la rémunération correcte des interprètes, mais reste
    un détour. La probabilité est basse car les montants sont modestes, la concurrence
    est nationale et les critères tournent autour du statut de l''artiste-interprète
    plus que de la diffusion. Impact limité, mais le coût d''entrée l''est aussi :
    deux sessions par an et un accompagnement gratuit au montage du dossier.

    '
