notes: 'MONTANTS : PlayRight ne publie AUCUN montant sur ses pages de soutien. À demander
  directement.

  ANGLE À CONSTRUIRE : ne pas présenter Gazmatek comme un festival, mais comme un
  projet qui (a) rémunère correctement des artistes-interprètes belges, et (b) transmet
  un savoir-faire technique (fabrication et exploitation d''un sound system) à des
  dizaines de jeunes bénévoles — ce qui touche les axes « soutien aux groupements
  d''intérêts » et « transmission et archivage du patrimoine culturel ».

  ATOUT PROCÉDURAL : le département Affaires culturelles accompagne gratuitement les
  porteurs de projet dans la préparation de leur dossier. Utiliser ce service AVANT
  de déposer — c''est un pré-diagnostic gratuit de recevabilité.

  DÉPÔT : uniquement via https://portal.playright.be/PR_Th/login. Créer le compte
  en amont.

  PISTE LIÉE — FUND BELGIAN MUSIC : co-fondé par PlayRight+, Sabam for Culture, Galm
  et Facir avec la Fondation Roi Baudouin, il finançait jusqu''à 10.000 € (2020) puis
  7.500 € (2021) par projet. ATTENTION : il cible les projets d''ENREGISTREMENT (albums)
  d''artistes, pas les organisateurs, et aucun appel postérieur à 2022 n''a été retrouvé
  — le fonds semble dormant. Ne pas y investir de temps sans vérification préalable.
  Site : https://www.fundbelgianmusic.be (inaccessible le 14/07/2026 — erreur serveur
  522).

  '
