why_us: 'Maison familiale bruxelloise avec près de 200 ans d''histoire (1832) et un
  stock important de bois et panneaux : le type d''acteur qui a la profondeur de stock
  pour absorber un besoin récurrent sans que ça lui coûte cher. Bruxelles reste à
  portée d''enlèvement depuis Genappe (~35 km). Leur activité de mobilier sur mesure
  suppose un atelier : il y a une capacité de découpe à explorer, et des chutes de
  panneaux qui existent forcément.'
