why_us: 'Falc''ohm System est exactement le profil visé : une organisation du secteur
  NON MARCHAND (socio-culturel) établie en Wallonie de langue française. Et surtout
  — c''est le point décisif — depuis le 1er janvier 2026, la CULTURE fait partie des
  SECTEURS PRIORITAIRES de l''APE : là où le régime normal exige que le travailleur
  soit inoccupé et inscrit comme demandeur d''emploi depuis au moins 4 mois, cette
  durée est ramenée à UN SEUL JOUR pour les secteurs prioritaires (santé, aide à la
  personne, petite enfance, culture, enseignement). Cela élargit massivement le vivier
  de candidats engageables. C''est le seul dispositif du portefeuille qui finance
  de l''EMPLOI STRUCTUREL et récurrent, et non un projet ponctuel : c''est le levier
  qui ferait passer l''ASBL du bénévolat intégral à une permanence salariée — ce qui,
  en retour, débloque le critère « activités artistiques professionnelles » exigé
  par la FWB.

  '
