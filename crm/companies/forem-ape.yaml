notes: 'PAS DE DATE LIMITE : l''APE n''est pas un appel à projets, c''est un régime
  permanent. Aucune échéance à rater — mais aussi aucune urgence artificielle. C''est
  un chantier de fond.

  CONDITION CLÉ (nouveauté 2026) : le travailleur doit être inoccupé et inscrit comme
  demandeur d''emploi depuis au moins 4 mois la veille de son engagement — SAUF dans
  les secteurs prioritaires, dont la CULTURE, où cette durée tombe à 1 jour. C''est
  l''argument à faire valoir : le secteur culturel est explicitement prioritaire.

  MONTANT : la page officielle indique « une subvention forfaitaire annuelle » versée
  trimestriellement, sans jamais publier le barème. → NON VÉRIFIÉ : le montant exact.
  La valeur de 12.000 € inscrite ici est un ordre de grandeur pour trier, pas un chiffre
  sourcé. À faire confirmer par le support APE.

  PROCÉDURE : vérifier l''éligibilité du travailleur via le calculateur disponible
  dans l''espace employeur (https://www.leforem.be/espace-entreprise). Sans accès
  à cet espace, un formulaire de demande d''accès est mis à disposition sur la page
  APE.

  PRÉREQUIS RÉALISTE AVANT DE SE LANCER : l''ASBL doit être capable de porter un contrat
  de travail (secrétariat social, trésorerie de roulement, gouvernance). Tant que
  ce n''est pas le cas, l''APE reste théorique. Le bon ordre est : sécuriser d''abord
  les subsides de projet (Province, FWB, Loterie), puis structurer l''emploi.

  EFFET DE LEVIER À NE PAS SOUS-ESTIMER : un poste salarié fait basculer Falc''ohm
  dans la catégorie « activités artistiques professionnelles » exigée par le Service
  des Musiques de la FWB — c''est le seul critère FWB que l''ASBL ne coche pas aujourd''hui.

  '
