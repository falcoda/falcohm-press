  rationale: 'Le fit est moyen dans l''immédiat : l''APE ne finance pas un festival,
    elle finance un SALAIRE — or l''ASBL fonctionne aujourd''hui entièrement au bénévolat
    et n''a probablement ni la trésorerie ni la structure administrative pour porter
    un contrat de travail. La probabilité est basse à court terme pour la même raison,
    et la procédure est lourde. Mais l''impact serait le plus élevé de tout le portefeuille
    : c''est une subvention ANNUELLE ET RÉCURRENTE, pas un one-shot, et un poste salarié
    transformerait l''ASBL en structure professionnelle — ce qui lèverait précisément
    le point faible qui plombe le dossier FWB (« activités artistiques professionnelles
    »). À considérer comme un objectif à 18-24 mois, pas comme une action de rentrée.

    '
