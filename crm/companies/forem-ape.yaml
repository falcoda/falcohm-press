  detail: 'Obtenir une APE pour un premier poste salarié (coordination / production
    / régie technique). L''employeur perçoit « une subvention forfaitaire annuelle
    » versée trimestriellement. Conditions : être une organisation du secteur non
    marchand avec un établissement en Wallonie de langue française, et engager un
    demandeur d''emploi inoccupé inscrit au Forem — durée d''inscription préalable
    ramenée à 1 jour pour le secteur culture. Vérification d''éligibilité du travailleur
    via le calculateur de l''espace employeur du Forem.

    '
