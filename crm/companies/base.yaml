why_us: 'Falc''ohm a DÉJÀ fourni du matériel de sonorisation pour une campagne Base
  (« Génération Débrouille feat. Camille Yembe ») : Base peut vérifier lui-même, sur
  sa propre campagne, que nous avons déjà livré. Un antécédent commercial est le meilleur
  prédicteur d''un oui. Surtout, l''opportunité est ACTIVE et DATÉE : la cabine d''enregistrement
  mobile Base tourne dans les festivals belges cet été 2026 pour collecter des voix
  avant la sortie du titre en septembre. Gazmatek (10-15 événements/an, +10 000 festivaliers,
  27 000 abonnés) est exactement le public que Base cherche à capter — maintenant.'
ask:
  type:
  - visibility
  - services
  - material
  detail: 'Ce n''est pas « donnez-nous de l''argent » mais un échange : accueillir
    la cabine d''enregistrement mobile Base sur un événement Gazmatek (accès direct
    à leur cible) contre un partenariat télécom/visibilité et, idéalement, une location/fourniture
    de sonorisation Falc''ohm reconduite. Réactiver la relation existante avant la
    fermeture de la fenêtre de septembre 2026.'
  realistic_value_eur: 5000
