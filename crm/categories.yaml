# Le registre des catégories de prospection.
#
# Une catégorie n'est PAS un dossier : c'est une étiquette. Une entreprise en porte
# plusieurs (Adam Hall = case_hardware + cabling + audio_components). Un dossier par
# catégorie aurait forcé à dupliquer la fiche — et à la maintenir en trois endroits.
#
# `tier` = l'ordre dans lequel on travaille, pas l'ordre alphabétique.
#   A  le levier réel pour un sound system associatif belge. On commence par là.
#   B  du vrai potentiel, mais plus long ou moins récurrent. Après.
#   C  faible probabilité de retour pour NOTRE projet. À ne faire que si tout le reste est fait.
#
# `module` / `persona` = le branchement sur la chaîne de production existante.
#   `~` = le module n'existe pas encore : une fiche de cette catégorie ne pourra pas
#   produire de PDF tant qu'on n'aura pas écrit `modules/<nom>.yaml`. C'est voulu :
#   ce champ mesure la dette de discours.
#
# `depth` = où en est le balayage. 0 → 25 → 50 → 100. On ne passe au palier suivant
# qu'une fois le précédent complet et validé.

categories:

