notes: 'C''est la porte européenne réellement praticable à notre échelle — contrairement
  à Europe Créative. Erasmus+ Jeunesse finance l''éducation NON FORMELLE, hors cadre
  scolaire, portée par et pour les jeunes : c''est exactement ce que fait le pôle
  technique de Falc''ohm System quand des bénévoles de moins de 30 ans apprennent
  à concevoir, fabriquer et exploiter un sound system et se transmettent ce savoir-faire.
  Un « échange de jeunes » construit avec un ou deux collectifs sound system étrangers
  (Pays-Bas, France, Allemagne, Espagne — la scène DIY y est dense et structurée)
  autour de la construction d''enceintes et de la culture des musiques électroniques
  coche toutes les cases du programme : mobilité, apprentissage non formel, coopération
  transnationale, participation des jeunes. Les budgets Erasmus+ sont par ailleurs
  sans commune mesure avec les subsides locaux.

  Fiche CRM : crm/companies/bureau-international-jeunesse.yaml

