notes: 'C''est LE dispositif public taillé pour ce que fait Gazmatek : l''« Aide aux
  structures de programmation » couvre explicitement l''organisation d''un festival
  de musique et d''une année/saison de concerts. Falc''ohm System coche les conditions
  de base : personne morale établie en Fédération Wallonie-Bruxelles (Genappe), aucun
  contrat-programme ni contrat de diffusion en cours, et un historique de plusieurs
  éditions — or le texte précise qu''en musiques actuelles « la priorité est accordée
  aux projets ayant déjà eu 2 éditions ou saisons précédentes ». Décisif : le Service
  des Musiques a une agente dédiée au secteur des MUSIQUES ÉLECTRONIQUES (Diane Dernouchamps).
  Le genre est donc un secteur d''instruction identifié, pas une exception à plaider.

