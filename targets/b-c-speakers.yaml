notes: 'B&C est la référence absolue du transducteur pour caisson à pavillon : le
  21DS115 et le 18SW115 sont littéralement les moteurs des sound systems horn-loaded
  européens. Falc''ohm construit des subs horn et des tops multi horn entry d''après
  des plans : le choix du transducteur est largement contraint par la conception acoustique,
  et B&C figure presque toujours dans la liste. Ils fournissent aussi les kits de
  reconing, ce qui couvre le besoin de maintenance sur 5-10 ans. Enfin, le groupe
  détient 18Sound et Ciare : un seul accord peut ouvrir trois catalogues.

