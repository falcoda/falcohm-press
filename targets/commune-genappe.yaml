notes: 'Falc''ohm System est une ASBL genappienne : c''est la commune de son siège
  social. Une commune soutient en priorité les associations de son territoire, et
  un festival de +10.000 personnes est l''un des événements les plus visibles de l''entité
  — c''est un argument de rayonnement communal direct. Deux échevinats sont concernés
  et doivent être travaillés séparément : Christophe Balestrie (Culture, Bibliothèque,
  ASBL des Salles communales) et Michaël Rouffiange (Festivités, Jeunesse) — ce dernier
  est le plus aligné, puisqu''il cumule exactement les deux compétences de Gazmatek.
  Enjeu stratégique majeur : la commune est la CLÉ D''ACCÈS au dispositif provincial
  « Place aux jeunes », dans lequel chaque euro communal est doublé par le Brabant
  wallon. Un euro obtenu ici en vaut donc deux.

  Fiche CRM : crm/companies/commune-genappe.yaml

