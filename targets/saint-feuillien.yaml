  de la musique — les 900 ans de l''abbaye en 2025, des concerts à la brasserie, le
  Faolan Irish Fest — donc le réflexe de soutenir un événement existe. Et nous avons
  un contact direct : Roland Leylan, le maître-brasseur. Une bière-partenaire sur
  un festival, c''est un bar qui tourne, une visibilité de marque, et un produit belge
  sur un public jeune.

