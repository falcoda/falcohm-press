notes: 'L''ASBL est domiciliée à Genappe et Gazmatek se déroule sur le territoire
  provincial : la condition territoriale — celle qui élimine le plus de candidats
  — est acquise d''office. Le règlement cite nommément les « festivals » et les «
  concerts » parmi les activités à réelle dimension culturelle, et réserve l''aide
  aux ASBL et associations de fait, à l''exclusion des sociétés commerciales : Falc''ohm
  System est exactement le profil ciblé. Avec plus de 10.000 festivaliers, Gazmatek
  relève de la Catégorie 1 (grande ampleur), le plafond le plus élevé. Les critères
  d''analyse récompensent précisément nos points forts : diversité et jeunesse des
  publics, promotion d''artistes du Brabant wallon, tarification accessible, liens
  avec le tissu associatif local, et développement durable en critère bonus.

  Fiche CRM : crm/companies/province-du-brabant-wallon.yaml

