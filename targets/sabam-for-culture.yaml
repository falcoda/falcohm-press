notes: 'La Sabam finance déjà des projets musicaux à hauteur de plus de 100.000 €
  par session de commission (28 projets musicaux soutenus pour 115.000 € lors d''une
  session récente) : le budget existe et sa raison d''être est d''être distribué au
  secteur musical. Gazmatek diffuse des auteurs dont la Sabam perçoit les droits —
  l''ASBL est donc du bon côté de l''écosystème. L''angle le plus solide n''est cependant
  pas le festival en tant que tel : ce sont les bourses liées à l''organisation de
  concerts live et au budget artistique, qui financent les cachets d''un organisateur
  plutôt que la carrière d''un artiste.

